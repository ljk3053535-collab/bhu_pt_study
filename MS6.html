<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT Quiz 6W</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0b0e18;
  --s1:       #131725;
  --s2:       #1c2035;
  --s3:       #242840;
  --border:   #2a2f4a;
  --accent:   #7ee8a2;
  --blue:     #5b9cf6;
  --red:      #ff6b6b;
  --yellow:   #ffd166;
  --text:     #dde3f0;
  --muted:    #5a637a;
  --radius:   14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:0 0 80px;}

/* ── NAV TABS ── */
.nav{display:flex;background:var(--s1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-btn{flex:1;padding:14px 8px;font-size:13px;font-weight:600;border:none;background:transparent;color:var(--muted);cursor:pointer;letter-spacing:.5px;transition:color .2s,border-bottom .2s;border-bottom:3px solid transparent;font-family:'Noto Sans KR',sans-serif;}
.nav-btn.active{color:var(--accent);border-bottom:3px solid var(--accent);}

/* ── VIEWS ── */
.view{display:none;padding:16px 14px;}
.view.active{display:block;}

/* ── HEADER ── */
.quiz-header{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px 14px;margin-bottom:16px;text-align:center;}
.quiz-header h1{font-family:'JetBrains Mono',monospace;font-size:clamp(13px,3.2vw,17px);color:var(--accent);letter-spacing:1px;margin-bottom:4px;}
.quiz-header p{font-size:12px;color:var(--muted);}
.prog-bar{background:var(--s2);border-radius:99px;height:6px;margin:12px 0 6px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));border-radius:99px;width:0%;transition:width .4s;}
.prog-txt{font-size:11px;color:var(--muted);}

/* ── CARD ── */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;transition:border-color .25s;}
.card-head{padding:12px 14px 8px;display:flex;gap:9px;align-items:flex-start;}
.q-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);background:rgba(126,232,162,.1);border:1px solid rgba(126,232,162,.2);border-radius:6px;padding:2px 7px;flex-shrink:0;margin-top:3px;}
.q-text{font-size:13.5px;line-height:1.65;font-weight:500;}
.cat-tag{display:inline-block;font-size:10px;color:var(--blue);background:rgba(91,156,246,.1);border:1px solid rgba(91,156,246,.2);border-radius:4px;padding:1px 6px;margin-left:6px;vertical-align:middle;}
.opts{padding:0 12px 12px;display:flex;flex-direction:column;gap:5px;}
.opt-btn{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border-radius:9px;cursor:pointer;border:1px solid var(--border);background:var(--s2);transition:all .18s;font-size:13px;line-height:1.5;color:var(--text);text-align:left;width:100%;font-family:'Noto Sans KR',sans-serif;}
.opt-btn:hover:not(.locked){border-color:var(--blue);background:rgba(91,156,246,.07);}
.opt-btn.correct{border-color:var(--accent)!important;background:rgba(126,232,162,.1)!important;color:var(--accent);}
.opt-btn.wrong{border-color:var(--red)!important;background:rgba(255,107,107,.07)!important;color:var(--red);}
.opt-btn.locked{pointer-events:none;}
.opt-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;margin-top:3px;}
.opt-btn.correct .opt-lbl,.opt-btn.correct .opt-tx{color:var(--accent);}
.opt-btn.wrong .opt-lbl,.opt-btn.wrong .opt-tx{color:var(--red);}
.exp{display:none;margin:0 12px 12px;padding:9px 11px;background:rgba(91,156,246,.07);border-left:3px solid var(--blue);border-radius:0 8px 8px 0;font-size:12.5px;color:#8fa3c8;line-height:1.65;}
.exp.show{display:block;}
.exp-label{font-weight:700;color:var(--blue);margin-right:4px;}

/* ── SCORE BOARD ── */
.score-board{display:none;background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:24px 16px;text-align:center;margin-bottom:16px;}
.score-board.show{display:block;}
.s-label{font-size:12px;color:var(--muted);margin-bottom:4px;}
.s-big{font-family:'JetBrains Mono',monospace;font-size:52px;color:var(--accent);line-height:1;}
.s-pct{font-size:14px;color:var(--text);margin-top:6px;}
.btn-reset{margin-top:14px;padding:9px 28px;border-radius:9px;background:var(--accent);color:#0b0e18;font-weight:700;font-size:13px;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-reset:hover{opacity:.85;}

/* ── SUMMARY ── */
.sum-hero{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:18px 16px;margin-bottom:14px;text-align:center;}
.sum-hero h2{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--accent);margin-bottom:4px;}
.sum-hero p{font-size:12px;color:var(--muted);}
.sum-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;text-align:center;}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:26px;color:var(--accent);}
.stat-num.blue{color:var(--blue);}
.stat-num.red{color:var(--red);}
.stat-num.yellow{color:var(--yellow);}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;}
.cat-section{margin-bottom:14px;}
.cat-title{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.5px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.sum-row{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--s1);border:1px solid var(--border);border-radius:9px;margin-bottom:6px;}
.sum-num{font-family:'JetBrains Mono',monospace;font-size:10px;min-width:28px;padding-top:2px;}
.sum-num.ok{color:var(--accent);}
.sum-num.ng{color:var(--red);}
.sum-num.skip{color:var(--muted);}
.sum-q{font-size:12.5px;line-height:1.5;flex:1;}
.sum-ans{font-size:11px;margin-top:3px;color:var(--muted);}
.sum-ans span{font-weight:600;}
.sum-ans span.ok{color:var(--accent);}
.sum-ans span.ng{color:var(--red);}
.sum-note{font-size:11px;color:#8fa3c8;margin-top:3px;line-height:1.5;}
.sum-hint{text-align:center;font-size:12px;color:var(--muted);padding:20px;background:var(--s1);border:1px dashed var(--border);border-radius:var(--radius);}
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="showTab('quiz')">퀴즈</button>
  <button class="nav-btn" onclick="showTab('summary')">서머리</button>
</nav>

<!-- QUIZ TAB -->
<div id="tab-quiz" class="view active">
  <div class="quiz-header">
    <h1>근골격계물리치료문제해결</h1>
    <p>6주차 · 50문제 선별</p>
    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-txt" id="progTxt">0 / 50 완료</div>
  </div>
  <div class="score-board" id="scoreBoard">
    <div class="s-label">최종 점수</div>
    <div class="s-big" id="sBig">-</div>
    <div class="s-pct" id="sPct"></div>
    <button class="btn-reset" onclick="resetQuiz()">다시 풀기</button>
  </div>
  <div id="qContainer"></div>
</div>

<!-- SUMMARY TAB -->
<div id="tab-summary" class="view">
  <div class="sum-hero">
    <h2>SUMMARY</h2>
    <p>퀴즈를 완료하면 결과가 표시됩니다</p>
  </div>
  <div class="sum-stats" id="sumStats" style="display:none;">
    <div class="stat-box"><div class="stat-num" id="st-total">-</div><div class="stat-lbl">전체 문제</div></div>
    <div class="stat-box"><div class="stat-num blue" id="st-done">-</div><div class="stat-lbl">완료</div></div>
    <div class="stat-box"><div class="stat-num" id="st-correct">-</div><div class="stat-lbl">정답</div></div>
    <div class="stat-box"><div class="stat-num red" id="st-wrong">-</div><div class="stat-lbl">오답</div></div>
  </div>
  <div id="sumContent">
    <div class="sum-hint">퀴즈를 풀면 문항별 결과가 여기 표시됩니다.</div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
var Q = [
  // 근이영양증 (10)
  {c:"근이영양증", q:"진행근디스트로피에 대한 설명으로 틀린 것은?",
   o:["중추신경계나 말초신경계 손상 없이 발생한다","유전적 이상으로 발생하는 근육질환이다","검사로 가우어스방법, 토마스검사 등이 있다","X염색체열성에 뒤센느형과 팔다리이음형이 포함된다","주로 남성에게 발생한다"],
   a:3, e:"팔다리이음형은 X염색체가 아닌 상동염색체 열성형이다."},
  {c:"근이영양증", q:"뒤센형의 특징적인 임상 징후는?",
   o:["반복 운동하면 근력이 좋아진다","바닥에서 일어날 때 몸을 짚는 고어 징후가 나타난다","얼굴 근육 마비가 가장 먼저 시작된다","성인기에 발병하며 진행이 느리다","근긴장도가 비정상적으로 높아진다"],
   a:1, e:"뒤센형은 근력 약화로 바닥에서 몸을 짚고 일어나는 고어 징후와 종아리 가성비대가 특징이다."},
  {c:"근이영양증", q:"뒤센느형 진행성근이영양증에 대한 설명으로 옳은 것은?",
   o:["상염색체 우성유전이며 성인에게도 발병한다","반성 열성유전이며 아동기 초기에 발병한다","상염색체 열성유전이며 남녀 모두에서 나타난다","병의 진행이 느리고 15세 이후에도 독립 보행 가능","초기 증세는 어깨·허벅지 근육 약화이다"],
   a:1, e:"뒤센느형은 반성 열성 유전이며 2~4세에 발병한다. 베커형이 15세 이후도 보행 가능. 초기 어깨·허벅지 약화는 팔다리이음형."},
  {c:"근이영양증", q:"진행성근이영양증과 관련된 혈액 검사 효소는?",
   o:["ATPase","Glucose","Epinephrine","Calcitonin","Creatine kinase"],
   a:4, e:"근육이 손상되면 CK(크레아틴 키나아제)가 혈액으로 유출되어 수치가 상승한다."},
  {c:"근이영양증", q:"베커형 근디스트로피에서 나타나지 않는 특징은?",
   o:["뒤센느형보다 진행이 느리다","일반적으로 7세 이후에 증상 시작","12세 전후 첨족 보행과 오리걸음","종아리 근육 가성비대 없음","15세 이후까지 독립 보행 가능"],
   a:3, e:"베커형에서도 종아리 근육의 가성비대가 나타날 수 있다."},
  {c:"근이영양증", q:"상염색체 우성 근이영양증이 아닌 것은?",
   o:["팔다리이음형","얼굴어깨위팔근육형","유아 얼굴어깨위팔형","어깨종아리형","눈디스트로피형"],
   a:0, e:"팔다리이음형은 상동염색체 열성이다."},
  {c:"근이영양증", q:"뒤셴느 근이영양증 연령별 특징으로 옳지 않은 것은?",
   o:["0-3세: 늦게 걷기 시작","3-6세: 척추측만증","3-6세: 발가락 끝 걷기","9-12세: 가우어스 징후가 처음 나타남","9-12세: 휠체어 이용"],
   a:3, e:"가우어스 징후는 3~6세에 처음 나타난다. 9~12세에는 휠체어를 이용하게 된다."},
  {c:"근이영양증", q:"진행성 근이영양증 설명으로 몸쪽 근육 약화를 알 수 있는 가장 좋은 검사는?",
   o:["오버검사","텐실론검사","바빈스키반사 검사","가우어스방법","토마스검사"],
   a:3, e:"가우어스방법은 바닥에서 한 손을 넙다리에 짚고 일어나는 방식으로 몸쪽 근력 약화를 평가한다."},
  {c:"근이영양증", q:"진행성 근이영양증에서 몸쪽보다 먼쪽 근육이 더 먼저 침범된다 - 맞는가?",
   o:["맞다, 손발 근육부터 시작된다","틀리다, 몸쪽(근위부) 근육에 더 잘 침범된다","반반이다","진행 단계에 따라 다르다","어깨와 발목이 동시에 침범된다"],
   a:1, e:"진행성 근이영양증은 먼쪽보다 몸쪽 팔다리, 골반 및 이음부위에 우선 침범된다."},
  {c:"근이영양증", q:"뒤시엔느형 근이영양증의 합병증으로 옳은 것은?",
   o:["뇌졸중","심근병증, 호흡기 합병증, 척추측만","말초신경병증","파킨슨병","고혈압과 당뇨"],
   a:1, e:"뒤센느형의 주요 합병증은 심근병증, 호흡기 합병증(호흡근 약화), 척추측만증이다."},

  // 검사법 (8)
  {c:"검사법", q:"Gower's sign에 대한 설명으로 옳은 것은?",
   o:["손의 감각 이상을 평가하는 검사","상지 근력을 평가하는 검사","몸통을 일으킬 때 손으로 허벅지를 짚고 일어나는 모습","무릎 안정성을 평가하는 검사","발목 반사를 확인하는 검사"],
   a:2, e:"Gower's sign은 골반·몸통 근약화로 손으로 몸을 짚으며 일어나는 DMD의 대표 징후이다."},
  {c:"검사법", q:"메이온스 징후(Meryon's sign)에 대한 설명으로 옳은 것은?",
   o:["팔이음뼈 근약화 검사, 눕힌 상태에서 겨드랑에 손을 넣어 검사","세운 상태에서 겨드랑에 손을 넣어 들 때 팔이 위로 올라가면 양성","팔꿈치와 무릎을 동시에 검사하는 방법","팔꿈치 기능을 평가하는 검사","발목 관절 구축 여부 확인"],
   a:1, e:"세운 상태에서 겨드랑이에 손을 넣어 들어올릴 때 팔이음뼈 근약화로 팔이 위로 밀려올라가는 현상이다."},
  {c:"검사법", q:"토마스 검사(Thomas test) 양성 시 보상 작용은?",
   o:["골반의 뒤쪽 기울임","허리의 앞굽음 증가","어깨 익상 견갑","무릎관절 과도 굽힘","발바닥 굽힘 증가"],
   a:1, e:"엉덩관절 굽힘근 단축 시 다리를 내릴 때 골반이 앞으로 기울고 허리 앞굽음이 심해진다."},
  {c:"검사법", q:"진행성 근이영양증과 직접 관련이 없는 검사는?",
   o:["Ober's test","Thomas test","Ely test","Gower's maneuver","Meryon's sign"],
   a:2, e:"Ely test는 넓적다리네갈래근 근길이 검사로 근이영양증과 직접 관련이 없다."},
  {c:"검사법", q:"Tensilon test의 목적은?",
   o:["근육 구조적 손상 확인","신경전도 속도 측정","AChE 억제로 아세틸콜린 증가 시 증상 호전 여부 확인","근육 단면적 측정","근력 강화 효과 평가"],
   a:2, e:"Tensilon test(에드로포늄 주입)는 아세틸콜린 분해를 억제해 근력이 일시 호전되는지 확인하는 MG 진단 검사이다."},
  {c:"검사법", q:"팔렌 검사(Phalen's Test)의 목적은?",
   o:["근육 강도 측정","어깨 관절 운동 범위 측정","손목터널증후군(CTS) 진단","목뼈 정렬 평가","고관절 굴곡 구축 평가"],
   a:2, e:"손목을 굽혀 정중신경이 압박될 때 저림·통증이 재현되면 CTS를 의심한다."},
  {c:"검사법", q:"오버 검사(Ober test)에서 평가하는 구조물은?",
   o:["중둔근","넙다리근막긴장근 및 장경인대","가자미근","비골근","대퇴이두근"],
   a:1, e:"오버 검사는 넙다리근막긴장근과 장경인대의 구축 여부를 확인한다."},

// ─── STATE ──────────────────────────────────────────────────────────────────
var TOTAL = Q.length;
var answered = 0;
var correct = 0;
var userAns = new Array(TOTAL).fill(-1);
var revealed = new Array(TOTAL).fill(false);

// ─── TABS ────────────────────────────────────────────────────────────────────
function showTab(name) {
  document.getElementById('tab-quiz').classList.remove('active');
  document.getElementById('tab-summary').classList.remove('active');
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(function(b, i) {
    b.classList.remove('active');
  });
  var btns = document.querySelectorAll('.nav-btn');
  if (name === 'quiz') btns[0].classList.add('active');
  else { btns[1].classList.add('active'); renderSummary(); }
}

// ─── BUILD QUIZ ──────────────────────────────────────────────────────────────
function buildQuiz() {
  var container = document.getElementById('qContainer');
  container.innerHTML = '';
  for (var qi = 0; qi < TOTAL; qi++) {
    (function(qi) {
      var q = Q[qi];
      var card = document.createElement('div');
      card.className = 'card';
      card.id = 'card-' + qi;

      // header
      var head = document.createElement('div');
      head.className = 'card-head';

      var num = document.createElement('span');
      num.className = 'q-num';
      num.textContent = 'Q' + (qi + 1);

      var qtext = document.createElement('span');
      qtext.className = 'q-text';
      qtext.textContent = q.q;

      var ctag = document.createElement('span');
      ctag.className = 'cat-tag';
      ctag.textContent = q.c;
      qtext.appendChild(ctag);

      head.appendChild(num);
      head.appendChild(qtext);
      card.appendChild(head);

      // options
      var optsDiv = document.createElement('div');
      optsDiv.className = 'opts';
      for (var oi = 0; oi < q.o.length; oi++) {
        (function(oi) {
          var btn = document.createElement('button');
          btn.className = 'opt-btn';
          btn.id = 'opt-' + qi + '-' + oi;

          var lbl = document.createElement('span');
          lbl.className = 'opt-lbl';
          lbl.textContent = (oi + 1) + '';

          var tx = document.createElement('span');
          tx.className = 'opt-tx';
          tx.textContent = q.o[oi];

          btn.appendChild(lbl);
          btn.appendChild(tx);
          btn.addEventListener('click', function() { selectAnswer(qi, oi); });
          optsDiv.appendChild(btn);
        })(oi);
      }
      card.appendChild(optsDiv);

      // explanation
      var exp = document.createElement('div');
      exp.className = 'exp';
      exp.id = 'exp-' + qi;
      var elbl = document.createElement('span');
      elbl.className = 'exp-label';
      elbl.textContent = '해설';
      exp.appendChild(elbl);
      exp.appendChild(document.createTextNode(q.e));
      card.appendChild(exp);

      container.appendChild(card);
    })(qi);
  }
  updateProg();
}

// ─── ANSWER ──────────────────────────────────────────────────────────────────
function selectAnswer(qi, oi) {
  if (revealed[qi]) return;
  revealed[qi] = true;
  userAns[qi] = oi;
  answered++;
  if (oi === Q[qi].a) correct++;

  for (var i = 0; i < Q[qi].o.length; i++) {
    var btn = document.getElementById('opt-' + qi + '-' + i);
    btn.classList.add('locked');
    if (i === Q[qi].a) btn.classList.add('correct');
    else if (i === oi) btn.classList.add('wrong');
  }

  document.getElementById('exp-' + qi).classList.add('show');
  updateProg();

  if (answered === TOTAL) {
    setTimeout(showScore, 350);
  }
}

function updateProg() {
  var pct = (answered / TOTAL) * 100;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progTxt').textContent = answered + ' / ' + TOTAL + ' 완료';
}

function showScore() {
  var board = document.getElementById('scoreBoard');
  board.classList.add('show');
  board.scrollIntoView({ behavior: 'smooth', block: 'start' });
  var pct = Math.round((correct / TOTAL) * 100);
  document.getElementById('sBig').textContent = correct + '/' + TOTAL;
  var grade = pct >= 80 ? '우수 🎉' : pct >= 60 ? '양호 👍' : '복습 필요 📚';
  document.getElementById('sPct').textContent = '정답률 ' + pct + '% · ' + grade;
}

function resetQuiz() {
  answered = 0; correct = 0;
  userAns = new Array(TOTAL).fill(-1);
  revealed = new Array(TOTAL).fill(false);
  document.getElementById('scoreBoard').classList.remove('show');
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── SUMMARY ─────────────────────────────────────────────────────────────────
function renderSummary() {
  var hero = document.querySelector('.sum-hero p');
  var statsDiv = document.getElementById('sumStats');
  var content = document.getElementById('sumContent');

  var done = revealed.filter(function(r) { return r; }).length;

  if (done === 0) {
    hero.textContent = '퀴즈를 풀면 결과가 표시됩니다';
    statsDiv.style.display = 'none';
    content.innerHTML = '<div class="sum-hint">퀴즈를 풀면 문항별 결과가 여기 표시됩니다.</div>';
    return;
  }

  var wrong = 0;
  for (var i = 0; i < TOTAL; i++) {
    if (revealed[i] && userAns[i] !== Q[i].a) wrong++;
  }

  hero.textContent = done + '문제 완료 · ' + correct + '정답 · ' + wrong + '오답';
  statsDiv.style.display = 'grid';
  document.getElementById('st-total').textContent = TOTAL;
  document.getElementById('st-done').textContent = done;
  document.getElementById('st-correct').textContent = correct;
  document.getElementById('st-wrong').textContent = wrong;

  // group by category
  var cats = {};
  for (var qi = 0; qi < TOTAL; qi++) {
    var cat = Q[qi].c;
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push(qi);
  }

  content.innerHTML = '';

  Object.keys(cats).forEach(function(cat) {
    var section = document.createElement('div');
    section.className = 'cat-section';

    var title = document.createElement('div');
    title.className = 'cat-title';
    title.textContent = cat.toUpperCase();
    section.appendChild(title);

    cats[cat].forEach(function(qi) {
      var row = document.createElement('div');
      row.className = 'sum-row';

      var numEl = document.createElement('div');
      numEl.className = 'sum-num';

      var qAns = userAns[qi];
      var correct_ans = Q[qi].a;
      var isOk = revealed[qi] && qAns === correct_ans;
      var isNg = revealed[qi] && qAns !== correct_ans;

      if (!revealed[qi]) {
        numEl.className = 'sum-num skip';
        numEl.textContent = 'Q' + (qi + 1);
      } else if (isOk) {
        numEl.className = 'sum-num ok';
        numEl.textContent = 'Q' + (qi + 1);
      } else {
        numEl.className = 'sum-num ng';
        numEl.textContent = 'Q' + (qi + 1);
      }

      var body = document.createElement('div');
      body.className = 'sum-q';

      var qtxt = document.createTextNode(Q[qi].q);
      body.appendChild(qtxt);

      if (revealed[qi]) {
        var ansLine = document.createElement('div');
        ansLine.className = 'sum-ans';

        var correctSpan = document.createElement('span');
        correctSpan.className = 'ok';
        correctSpan.textContent = (correct_ans + 1) + '. ' + Q[qi].o[correct_ans];

        if (isOk) {
          ansLine.appendChild(document.createTextNode('정답: '));
          ansLine.appendChild(correctSpan);
        } else {
          var wrongSpan = document.createElement('span');
          wrongSpan.className = 'ng';
          wrongSpan.textContent = (qAns + 1) + '. ' + Q[qi].o[qAns];
          ansLine.appendChild(document.createTextNode('내 답: '));
          ansLine.appendChild(wrongSpan);
          ansLine.appendChild(document.createTextNode(' / 정답: '));
          ansLine.appendChild(correctSpan);
        }
        body.appendChild(ansLine);

        var note = document.createElement('div');
        note.className = 'sum-note';
        note.textContent = Q[qi].e;
        body.appendChild(note);
      } else {
        var skipLine = document.createElement('div');
        skipLine.className = 'sum-ans';
        skipLine.textContent = '미완료';
        body.appendChild(skipLine);
      }

      row.appendChild(numEl);
      row.appendChild(body);
      section.appendChild(row);
    });

    content.appendChild(section);
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
buildQuiz();
</script>
