<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Test 해설집</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --accent3: #8b5cf6;
    --correct: #10b981;
    --wrong: #ef4444;
    --warn: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --shoulder: #3b82f6;
    --elbow: #8b5cf6;
    --wrist: #10b981;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 1.5rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.3);
    padding: 0.3rem 0.6rem;
    border-radius: 4px;
    letter-spacing: 2px;
  }
  .title {
    font-size: 1.3rem;
    font-weight: 900;
    background: linear-gradient(90deg, #60a5fa, #a78bfa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stats-bar {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .stat-chip {
    font-size: 0.72rem;
    font-weight: 700;
    padding: 0.3rem 0.7rem;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .stat-all { background: rgba(255,255,255,0.08); color: #cbd5e1; border: 1px solid rgba(255,255,255,0.1); }
  .stat-s { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }
  .stat-e { background: rgba(139,92,246,0.15); color: #c4b5fd; border: 1px solid rgba(139,92,246,0.3); }
  .stat-w { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }

  .controls {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-btn.shoulder.active { background: var(--shoulder); border-color: var(--shoulder); }
  .filter-btn.elbow.active { background: var(--elbow); border-color: var(--elbow); }
  .filter-btn.wrist.active { background: var(--wrist); border-color: var(--wrist); }

  .search-wrap { position: relative; margin-left: auto; }
  .search-input {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.8rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.45rem 0.9rem 0.45rem 2rem;
    border-radius: 6px;
    width: 180px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 0.6rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; pointer-events: none; }

  .toggle-all-btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    border: 1px solid rgba(59,130,246,0.3);
    background: rgba(59,130,246,0.1);
    color: #93c5fd;
    cursor: pointer;
    transition: all 0.2s;
  }
  .toggle-all-btn:hover { background: rgba(59,130,246,0.2); }

  /* MAIN */
  .main { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  .section-label {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 2rem 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .section-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .section-label-text { font-size: 1rem; font-weight: 700; }
  .section-count { font-size: 0.75rem; color: var(--muted); margin-left: auto; font-family: 'JetBrains Mono', monospace; }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 0.75rem;
    overflow: hidden;
  }
  .card.shoulder { border-left: 3px solid var(--shoulder); }
  .card.elbow { border-left: 3px solid var(--elbow); }
  .card.wrist { border-left: 3px solid var(--wrist); }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.9rem 1rem 0.7rem;
  }

  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    min-width: 36px;
    text-align: center;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .shoulder .q-num { background: rgba(59,130,246,0.15); color: #93c5fd; }
  .elbow .q-num { background: rgba(139,92,246,0.15); color: #c4b5fd; }
  .wrist .q-num { background: rgba(16,185,129,0.15); color: #6ee7b7; }

  .q-text { flex: 1; font-size: 0.85rem; line-height: 1.6; color: #cbd5e1; font-weight: 400; }

  /* CHOICES - quiz interactive */
  .card-choices { padding: 0 1rem 0.6rem; display: flex; flex-direction: column; gap: 0.4rem; }
  .choice {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 0.45rem 0.7rem;
    border-radius: 6px;
    font-size: 0.82rem;
    line-height: 1.5;
    border: 1px solid var(--border);
    transition: all 0.12s;
  }
  .choice-idle {
    background: var(--surface2);
    cursor: pointer;
  }
  .choice-idle:hover {
    border-color: var(--accent);
    background: rgba(59,130,246,0.07);
    color: #93c5fd;
  }
  .choice-correct {
    background: rgba(16,185,129,0.1);
    border-color: rgba(16,185,129,0.4);
    color: #6ee7b7;
  }
  .choice-wrong {
    background: rgba(239,68,68,0.08);
    border-color: rgba(239,68,68,0.3);
    color: #fca5a5;
  }
  .choice-dim {
    color: #475569;
    border-color: transparent;
  }
  .choice-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* RESULT BADGE */
  .result-badge {
    display: block;
    margin: 0 1rem 0.6rem;
    padding: 0.3rem 0.7rem;
    border-radius: 5px;
    font-size: 0.8rem;
    font-weight: 700;
  }
  .badge-ok { background: rgba(16,185,129,0.12); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
  .badge-no { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

  /* EXPLANATION */
  .card-explain {
    border-top: 1px solid var(--border);
    padding: 0.8rem 1rem;
    background: rgba(0,0,0,0.18);
  }

  .explain-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    margin-top: 0.5rem;
  }
  .explain-row {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    margin-bottom: 0.5rem;
    font-size: 0.8rem;
    line-height: 1.6;
  }
  .explain-row:last-child { margin-bottom: 0; }
  .explain-tag {
    font-size: 0.62rem;
    font-weight: 700;
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 3px;
    letter-spacing: 0.5px;
    font-family: 'JetBrains Mono', monospace;
  }
  .tag-key { background: rgba(59,130,246,0.2); color: #93c5fd; }
  .tag-why { background: rgba(239,68,68,0.15); color: #fca5a5; }
  .tag-tip { background: rgba(245,158,11,0.15); color: #fcd34d; }

  .source {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.6rem;
    font-family: 'JetBrains Mono', monospace;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
  }

  .no-result {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .score-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--correct);
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.25);
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="logo">PT · SPECIAL TEST</span>
    <h1 class="title">도수물리치료학 퀴즈</h1>
  </div>
  <div class="stats-bar">
    <span class="stat-chip stat-all">전체 <b id="cnt-all">0</b>문항</span>
    <span class="stat-chip stat-s">🦴 어깨 <b id="cnt-s">0</b></span>
    <span class="stat-chip stat-e">💪 팔꿈치 <b id="cnt-e">0</b></span>
    <span class="stat-chip stat-w">✋ 손목·손 <b id="cnt-w">0</b></span>
  </div>
  <div class="controls">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn shoulder" data-filter="shoulder" onclick="setFilter('shoulder',this)">어깨</button>
    <button class="filter-btn elbow" data-filter="elbow" onclick="setFilter('elbow',this)">팔꿈치</button>
    <button class="filter-btn wrist" data-filter="wrist" onclick="setFilter('wrist',this)">손목·손</button>
    <button class="toggle-all-btn" onclick="resetAll()">🔄 초기화</button>
    <span class="score-display">✅ <b id="score-correct">0</b> / <b id="score-total">0</b> <span id="score-pct" style="color:var(--accent2);margin-left:4px;font-size:0.72rem;"></span></span>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="검사명, 키워드 검색..." oninput="doSearch(this.value)">
    </div>
  </div>
</div>

<div class="main" id="main"></div>

<script>
const DATA = [
  // ===== 어깨 (shoulder) =====
  {
    cat:'shoulder', q:'팔꿈치를 편 상태에서 어깨를 90° 굽히고 약간의 가로벌림 상태에서 어깨를 안쪽돌림 시켜 엄지손가락이 바닥을 향하게 한 다음 굽힘에 대해 저항을 주면 통증과 약증이 나타나면?',
    ans:2, choices:['요가손 검사(Yergason\'s Test)','깡통비우기검사(Empty can Test)','올림징후(Lift-off Test)','팔 떨어뜨리기 검사(Drop-arm Test)','크랭크 검사(Crank test)'],
    key:'어깨 견갑면 30° 전방, 안쪽돌림(엄지↓), 하방저항 → 가시위근 파열/충돌 증후군',
    why:'①Yergason은 팔꿈치 90° 굽힘+뒤침저항. ③Lift-off는 허리뒤손 들기. ④Drop-arm은 벌림유지 불가. ⑤Crank는 160° 벌림+축성압박',
    tip:'★ Empty can = Jobe Test. 견갑면(scapular plane)=전방 30°가 핵심',
    src:'근골격계 진단학 3판 현문사 p.68'
  },
  {
    cat:'shoulder', q:'검사자는 한 손은 가쪽위관절융기에 엄지를 대고 환자의 손목 굽힘, 아래팔 엎침, 팔꿈치관절 굽힘 상태에서 팔꿉관절을 천천히 폈을 때 가쪽위관절융기부에서 심한 통증을 호소했을 때?',
    ans:3, choices:['코젠검사(Cozen Test)','밀킹검사(Milking Test)','밀검사(Mill Test)','요가손 검사(Yergason\'s Test)','마우드슬리검사(Maudsley Test)'],
    key:'손목굽힘+엎침 상태에서 팔꿈치 신전 → 가쪽위관절융기 통증 = Mill test (수동신장)',
    why:'①Cozen은 능동저항(손목 폄 저항). ②Milking은 MCL 검사. ④Yergason은 어깨/이두건 검사. ⑤Maudsley는 중지 폄 저항',
    tip:'Mill = 수동신장(passive stretch), Cozen = 능동저항(active resistance)',
    src:'근골격계진단학 및 검사 3판 현문사 p.93'
  },
  {
    cat:'shoulder', q:'45세 남성, 배드민턴 중 어깨 통증. 벌림 60-120도에서 극심한 통증, 완전히 위로 들면 통증 감소. 가장 먼저 시행할 충돌증후군 테스트는?',
    ans:2, choices:['불안정성 검사(Apprehension Test)','니어 검사(Neer Test)','핑켈스타인 검사(Finkelstein Test)','라크만 검사(Lachman Test)','깡통비우기 검사(Empty can Test)'],
    key:'60~120° painful arc → 충돌증후군(impingement syndrome). Neer test = 수동 끝범위 굽힘',
    why:'①Apprehension은 불안정성. ③Finkelstein은 손목. ④Lachman은 무릎ACL. ⑤Empty can은 가시위근 근력검사',
    tip:'★ Painful arc(60~120°)는 어깨 충돌증후군의 핵심 임상 소견',
    src:'근골격계진단학 및 검사 3판 현문사 p.75'
  },
  {
    cat:'shoulder', q:'30세 헬스트레이너, 벤치프레스 중 어깨 앞쪽 통증. 팔꿈치 펴고 손바닥 위로+전방굴곡 시 위팔두갈래근 힘줄 부위 통증. 의심 테스트는?',
    ans:1, choices:['스피드 검사(Speed\'s Test)','깡통비우기 검사(Empty can Test)','올림징후 검사(Lift-off Test)','호킨슨-케네디 검사(Hawkins-Kennedy Test)','요가손 검사(Yergason\'s Test)'],
    key:'팔꿈치 신전+뒤침+전방굴곡 저항 → 이두근 긴갈래 건염 = Speed\'s Test',
    why:'②Empty can은 가시위근. ③Lift-off는 어깨뼈밑근. ④Hawkins-Kennedy는 충돌증후군. ⑤Yergason은 이두건/가로위팔인대',
    tip:'Speed\'s = 팔꿈치 신전+뒤침+전방굴곡저항. Yergason = 팔꿈치 90°굽힘+뒤침저항',
    src:'근골격계진단학 및 검사 3판 현문사 p.68'
  },
  {
    cat:'shoulder', q:'환자 바로 누워 팔 머리 위. 검사자가 위팔뼈머리 뒷부분에 손을 놓고 앞쪽으로 밀며 위팔뼈를 가쪽돌림 시켰을 때 덜컹/가는 소리 = ?',
    ans:3, choices:['킴검사(Kim Test)','앞쪽미끄러짐검사(Anterior slide Test)','꾹꾹소리검사(Clunk Test)','팔 떨어뜨리기 검사(Drop-arm Test)','크랭크 검사(Crank Test)'],
    key:'바로눕기+팔 머리위+위팔뼈머리 후→앞 밀기+가쪽돌림 → 덜컹소리 = Clunk Test (관절와순 손상)',
    why:'①Kim은 뒤아래 관절와순(앉은자세). ②Anterior slide는 SLAP(허리뒤손). ④Drop-arm은 회전근개. ⑤Crank는 160° 벌림',
    tip:'★ Clunk Test: 앙와위, 팔 머리위, 후방→전방 밀기+가쪽돌림, 덜컹소리=양성',
    src:'근골격계 진단학 3판 현문사 p.72'
  },
  {
    cat:'shoulder', q:'위팔두갈래근 긴갈래(Biceps long head) 건염/병변 확인 검사로만 짝지어진 것은?',
    ans:1, choices:['스피드 검사(Speed test), 요가손 검사(Yergason test)','깡통 비우기 검사(Empty can test), 크랭크 검사(Crank test)','루즈 검사(Roos test), 킴 검사(Kim test)','호킨스-케네디 검사(Hawkins-Kennedy test), 꾹꾹 소리 검사(Clunk test)','뒤안쪽 충돌 검사(Posterior-internal impingement test), 스피드 검사(Speed test)'],
    key:'Speed\'s + Yergason\'s = 이두근 긴갈래 건염 평가 2대 검사',
    why:'②는 가시위근/관절와순. ③은 TOS/뒤아래와순. ④는 충돌증후군/관절와순. ⑤Posterior-internal은 관절와순+충돌',
    tip:'이두건 건염 → Speed\'s(전방굴곡) + Yergason\'s(뒤침저항) 세트로 암기',
    src:'근골격계 진단학 3판 68p'
  },

// ===== STATE =====
let currentFilter = 'all';
let currentSearch = '';
const answered = {}; // idx -> { chosen, correct }
let scoreCorrect = 0, scoreTotal = 0;

// ===== SCORE UI =====
function updateScore() {
  document.getElementById('score-correct').textContent = scoreCorrect;
  document.getElementById('score-total').textContent = scoreTotal;
  const pct = scoreTotal ? Math.round(scoreCorrect/scoreTotal*100) : 0;
  document.getElementById('score-pct').textContent = scoreTotal ? pct+'%' : '';
}

// ===== ANSWER HANDLER =====
function choose(idx, chosen) {
  if (answered[idx]) return; // already answered
  const d = DATA[idx];
  const correct = d.ans;
  const isCorrect = chosen === correct;

  answered[idx] = { chosen, correct, isCorrect };
  if (isCorrect) scoreCorrect++;
  scoreTotal++;
  updateScore();

  const card = document.querySelector(`.card[data-id="${idx}"]`);
  if (!card) return;

  // reveal all choices
  card.querySelectorAll('.choice').forEach((el, i) => {
    el.classList.remove('choice-idle');
    const num = i + 1;
    if (num === correct) el.classList.add('choice-correct');
    else if (num === chosen) el.classList.add('choice-wrong');
    else el.classList.add('choice-dim');
  });

  // show result badge
  const badge = card.querySelector('.result-badge');
  badge.textContent = isCorrect ? '✅ 정답!' : `❌ 오답 — 정답 ${correct}번`;
  badge.className = 'result-badge ' + (isCorrect ? 'badge-ok' : 'badge-no');

  // show explanation
  card.querySelector('.card-explain').style.display = 'block';
}

// ===== BUILD CARDS =====
function buildCards() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  const cats = ['shoulder','elbow','wrist'];
  const catInfo = {
    shoulder: { label: '🦴 어깨 (Shoulder)', color: 'var(--shoulder)' },
    elbow:    { label: '💪 팔꿈치 (Elbow)',   color: 'var(--elbow)' },
    wrist:    { label: '✋ 손목·손 (Wrist/Hand)', color: 'var(--wrist)' }
  };

  const nums = { shoulder:0, elbow:0, wrist:0 };
  DATA.forEach(d => nums[d.cat]++);
  document.getElementById('cnt-all').textContent = DATA.length;
  document.getElementById('cnt-s').textContent = nums.shoulder;
  document.getElementById('cnt-e').textContent = nums.elbow;
  document.getElementById('cnt-w').textContent = nums.wrist;

  cats.forEach(cat => {
    if (currentFilter !== 'all' && currentFilter !== cat) return;

    let n = 0;
    const items = [];
    DATA.forEach((d, idx) => {
      if (d.cat !== cat) return;
      n++;
      const searchMatch = !currentSearch || (d.q + d.choices.join('') + d.key + d.tip).toLowerCase().includes(currentSearch.toLowerCase());
      if (searchMatch) items.push({ d, idx, n });
    });

    if (items.length === 0) return;

    const sec = document.createElement('div');
    sec.className = 'section-label';
    sec.innerHTML = `<span class="section-dot" style="background:${catInfo[cat].color}"></span>
      <span class="section-label-text" style="color:${catInfo[cat].color}">${catInfo[cat].label}</span>
      <span class="section-count">${items.length}문항</span>`;
    main.appendChild(sec);

    items.forEach(({ d, idx, n: catN }) => {
      const prev = answered[idx];

      const choicesHtml = d.choices.map((c, i) => {
        const num = i + 1;
        let cls = 'choice choice-idle';
        if (prev) {
          if (num === prev.correct) cls = 'choice choice-correct';
          else if (num === prev.chosen) cls = 'choice choice-wrong';
          else cls = 'choice choice-dim';
        }
        const onclick = prev ? '' : `onclick="choose(${idx},${num})"`;
        return `<div class="${cls}" ${onclick}>
          <span class="choice-num">${num}</span>
          <span>${c}</span>
        </div>`;
      }).join('');

      let badgeHtml = '<span class="result-badge"></span>';
      if (prev) {
        const txt = prev.isCorrect ? '✅ 정답!' : `❌ 오답 — 정답 ${prev.correct}번`;
        const cls = prev.isCorrect ? 'badge-ok' : 'badge-no';
        badgeHtml = `<span class="result-badge ${cls}">${txt}</span>`;
      }

      const expDisplay = prev ? 'block' : 'none';

      const card = document.createElement('div');
      card.className = `card ${cat}`;
      card.dataset.id = idx;
      card.innerHTML = `
        <div class="card-header">
          <span class="q-num">Q${catN}</span>
          <span class="q-text">${d.q}</span>
        </div>
        <div class="card-choices">${choicesHtml}</div>
        ${badgeHtml}
        <div class="card-explain" style="display:${expDisplay}">
          <div class="explain-box">
            <div class="explain-row"><span class="explain-tag tag-key">핵심</span><span>${d.key}</span></div>
            <div class="explain-row"><span class="explain-tag tag-why">오답</span><span>${d.why}</span></div>
            <div class="explain-row"><span class="explain-tag tag-tip">TIP</span><span>${d.tip}</span></div>
          </div>
          <div class="source">📚 ${d.src}</div>
        </div>
      `;
      main.appendChild(card);
    });
  });

  if (main.querySelectorAll('.card').length === 0)
    main.innerHTML = '<div class="no-result">🔍 검색 결과가 없습니다.</div>';
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildCards();
}

function doSearch(v) {
  currentSearch = v;
  buildCards();
}

function resetAll() {
  if (!confirm('모든 풀이 기록을 초기화할까요?')) return;
  Object.keys(answered).forEach(k => delete answered[k]);
  scoreCorrect = 0; scoreTotal = 0;
  updateScore();
  buildCards();
}

buildCards();
updateScore();
</script>
</body>
</html>
