<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>물리치료사 국가시험 — 의료법규</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
:root {
  --bg:#0d1117; --surface:#161b22; --surface2:#1f2637; --border:#30363d;
  --accent:#4f8ef7; --green:#3fb950; --red:#f85149; --yellow:#e3b341;
  --text:#e6edf3; --text2:#8b949e; --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* MODE TABS */
.mode-tabs{max-width:900px;margin:16px auto 0;padding:0 16px;display:flex;gap:0;border-bottom:2px solid var(--border);}
.mode-tab{padding:12px 24px;font-size:.95rem;font-weight:700;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:3px solid transparent;margin-bottom:-2px;font-family:inherit;transition:all .2s;}
.mode-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.mode-tab:hover:not(.active){color:var(--text);}

/* SUMMARY */
.summary-wrap{max-width:900px;margin:20px auto 80px;padding:0 16px;}
.summary-law-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.summary-law-tab{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:.82rem;cursor:pointer;transition:all .2s;font-family:inherit;}
.summary-law-tab:hover{border-color:var(--accent);color:var(--accent);}
.summary-law-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}

.summary-section{margin-bottom:12px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.summary-header{padding:14px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:var(--surface);user-select:none;}
.summary-header:hover{background:var(--surface2);}
.summary-title{font-size:.92rem;font-weight:700;display:flex;align-items:center;gap:10px;}
.summary-arrow{font-size:.8rem;color:var(--text2);transition:transform .2s;}
.summary-section.open .summary-arrow{transform:rotate(180deg);}
.summary-body{display:none;padding:16px 18px;font-size:.85rem;line-height:1.9;border-top:1px solid var(--border);background:var(--bg);}
.summary-section.open .summary-body{display:block;}

.s-article{margin-bottom:14px;}
.s-article-title{font-weight:700;color:var(--accent);margin-bottom:4px;font-size:.88rem;}
.s-row{display:flex;gap:8px;margin-bottom:4px;padding:6px 10px;border-radius:6px;background:var(--surface);}
.s-key{color:#e8a84f;font-weight:700;min-width:60px;flex-shrink:0;font-size:.82rem;}
.s-val{color:var(--text);font-size:.83rem;line-height:1.7;}
.s-val b{color:#f5c842;}
.s-val .red{color:var(--red);}
.s-val .green{color:var(--green);}
.s-val .blue{color:var(--accent);}
.s-val .orange{color:#e8a84f;}
.s-note{background:#1a2340;border-left:3px solid var(--accent);padding:8px 12px;border-radius:0 6px 6px 0;font-size:.82rem;margin:6px 0;color:var(--text2);}
.s-note b{color:var(--text);}
.s-table{width:100%;border-collapse:collapse;font-size:.82rem;margin:8px 0;}
.s-table th{background:var(--surface2);color:var(--accent);padding:6px 10px;text-align:left;border:1px solid var(--border);}
.s-table td{padding:6px 10px;border:1px solid var(--border);vertical-align:top;line-height:1.6;}
.s-table tr:nth-child(even) td{background:var(--surface);}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.72rem;font-weight:700;margin-left:4px;}
.badge-red{background:#2a0d0d;color:var(--red);}
.badge-green{background:#0d2a1a;color:var(--green);}
.badge-blue{background:#0d1a3a;color:var(--accent);}
.badge-yellow{background:#2a200d;color:#e3b341;}

/* HEADER */
.header{background:linear-gradient(135deg,#1a2340 0%,#0d1117 100%);border-bottom:1px solid var(--border);padding:20px 24px;position:sticky;top:0;z-index:100;}
.header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.logo{font-size:1.1rem;font-weight:700;color:var(--accent);}
.logo span{color:var(--text2);font-weight:300;font-size:.85rem;display:block;margin-top:2px;}
.stats-bar{display:flex;gap:16px;font-size:.8rem;}
.stat{text-align:center;}
.stat-n{font-size:1.2rem;font-weight:700;}
.stat-n.green{color:var(--green);}
.stat-n.red{color:var(--red);}
.stat-n.blue{color:var(--accent);}
.stat-label{color:var(--text2);}

/* TABS */
.tabs{max-width:900px;margin:20px auto 0;padding:0 16px;display:flex;gap:8px;flex-wrap:wrap;}
.tab{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:.82rem;cursor:pointer;transition:all .2s;font-family:inherit;}
.tab:hover{border-color:var(--accent);color:var(--accent);}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
.tab-count{font-size:.72rem;opacity:.7;margin-left:4px;}

/* PROGRESS */
.progress-wrap{max-width:900px;margin:16px auto 0;padding:0 16px;}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .4s ease;}
.progress-text{font-size:.75rem;color:var(--text2);margin-top:6px;text-align:right;}

/* QUESTION LIST */
.question-list{max-width:900px;margin:20px auto 80px;padding:0 16px;}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;transition:border-color .2s;}
.q-card.answered-correct{border-color:var(--green);}
.q-card.answered-wrong{border-color:var(--red);}
.q-header{padding:16px 20px 12px;display:flex;gap:12px;align-items:flex-start;}
.q-num{background:var(--surface2);border-radius:6px;padding:2px 8px;font-size:.78rem;color:var(--text2);white-space:nowrap;margin-top:2px;flex-shrink:0;}
.q-text{font-size:.95rem;line-height:1.6;font-weight:500;}
.q-tag{font-size:.7rem;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle;font-weight:400;}
.tag-kisa{background:#1a3a5c;color:#6ab0f5;}
.tag-medical{background:#1a3320;color:#56d68a;}
.tag-disabled{background:#2d1f40;color:#b07fe8;}
.tag-elderly{background:#3a2a10;color:#e8a84f;}
.tag-insurance{background:#1f2f2f;color:#4ecdc4;}

.options{padding:0 20px 4px;}
.option{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:8px;border:1px solid transparent;cursor:pointer;transition:all .15s;font-size:.88rem;line-height:1.5;margin-bottom:6px;}
.option:hover:not(.disabled){background:var(--surface2);border-color:var(--border);}
.option.disabled{cursor:default;}
.option-num{width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;margin-top:1px;}
.option.selected .option-num{background:var(--accent);border-color:var(--accent);color:#fff;}
.option.correct .option-num{background:var(--green);border-color:var(--green);color:#fff;}
.option.wrong .option-num{background:var(--red);border-color:var(--red);color:#fff;}
.option.show-correct .option-num{background:var(--green);border-color:var(--green);color:#fff;}

/* RESULT */
.result-box{margin:4px 20px 16px;padding:12px 14px;border-radius:8px;font-size:.83rem;line-height:1.6;display:none;}
.result-box.show{display:block;}
.result-box.correct{background:#0d2a1a;border:1px solid var(--green);color:#7fefb0;}
.result-box.wrong{background:#2a0d0d;border:1px solid var(--red);}
.result-correct-label{color:var(--green);font-weight:700;}
.result-wrong-label{color:var(--red);font-weight:700;}
.explanation{color:var(--text);margin-top:6px;}

/* BOTTOM RESET */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;display:flex;justify-content:center;gap:12px;}
.btn{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:700;transition:all .2s;}
.btn-reset{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-reset:hover{color:var(--text);border-color:var(--text2);}
.btn-wrong{background:var(--red);color:#fff;}
.btn-wrong:hover{opacity:.85;}

.empty{text-align:center;color:var(--text2);padding:60px 20px;font-size:.9rem;}

@media(max-width:600px){
  .header-inner{gap:8px;}
  .stat-n{font-size:1rem;}
  .q-text{font-size:.88rem;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">물리치료사 국가시험<span>의료법규 문제은행</span></div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-n blue" id="s-total">0</div><div class="stat-label">전체</div></div>
      <div class="stat"><div class="stat-n green" id="s-correct">0</div><div class="stat-label">정답</div></div>
      <div class="stat"><div class="stat-n red" id="s-wrong">0</div><div class="stat-label">오답</div></div>
      <div class="stat"><div class="stat-n" id="s-rate" style="color:var(--yellow)">0%</div><div class="stat-label">정답률</div></div>
    </div>
  </div>
</div>

<div class="mode-tabs">
  <button class="mode-tab active" id="mode-quiz" onclick="setMode('quiz')">📝 문제풀기</button>
  <button class="mode-tab" id="mode-summary" onclick="setMode('summary')">📖 써머리</button>
</div>
<div id="quiz-area">
<div class="tabs" id="tabs"></div>
<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="progress-text" id="progress-text">0 / 0 문제 풀었습니다</div>
</div>

<div class="question-list" id="question-list"></div>

</div><!-- /quiz-area -->

<!-- 써머리 영역 -->
<div id="summary-area" style="display:none">
<div class="summary-wrap">
  <div class="summary-law-tabs" id="summary-law-tabs"></div>
  <div id="summary-content"></div>
</div>
</div>

<div class="bottom-bar">
  <button class="btn btn-wrong" onclick="showWrongOnly()">❌ 오답만 보기</button>
  <button class="btn btn-reset" onclick="resetAll()">↺ 전체 초기화</button>
</div>

<script>
const QUESTIONS = [
  // ===== 의료기사 등에 관한 법률 =====
  {id:1,law:"kisa",text:"「의료기사 등에 관한 법률」에서 의료기사 등의 자격과 면허 등에 관한 사항을 규정한 목적은?",options:["국민의 건강 향상","국민의 삶의 질 향상","국민의 건강증진","국민 건강의 보호 증진","국민의 보건과 의료 향상"],answer:4,explanation:"의료기사 등에 관한 법률 제1조: 이 법은 의료기사, 보건의료정보관리사 및 안경사의 자격·면허 등에 관하여 필요한 사항을 정함으로써 국민의 보건 및 의료 향상에 이바지함을 목적으로 한다."},
  {id:2,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」을 제정한 목적은?",options:["국민의 보건 및 의료 향상에 이바지함을 목적으로 한다","국민의 건강증진 및 유지에 이바지함을 목적으로 한다","모든 국민이 수준 높은 의료를 받을 수 있도록 위함이다","국민의 보건에 관해 필요한 사항을 정하고 국민의 건강을 증진함을 목적으로 한다","국민의 보건 행정을 합리적으로 운영하고 국민 보건 향상에 이바지함을 목적으로 한다"],answer:0,explanation:"의료기사 등에 관한 법률 제1조: 국민의 보건 및 의료 향상에 이바지함을 목적으로 한다."},
  {id:3,law:"kisa",text:"「의료기사 등에 관한 법률」에서 의료기사는 의사 또는 치과의사의 ( ) 아래 진료나 의화학적 검사에 종사하는 사람을 말한다. 다음 중 ( ) 안에 알맞은 것은?",options:["감독","참여","협의","지도","처방"],answer:3,explanation:"의료기사 등에 관한 법률 제2조: 의료기사는 의사 또는 치과의사의 '지도' 아래 진료나 의화학적 검사에 종사하는 사람이다."},
  {id:4,law:"kisa",text:"「의료기사 등에 관한 법률」에서 규정하고 있는 의료기사에 대한 정의로 옳은 것은?",options:["보건과 양호지도에 종사하는 사람","진료나 보건지도에 종사하는 사람","치료와 보건지도에 종사하는 사람","진료 보조와 보건지도에 종사는 사람","진료나 의화학적 검사에 종사하는 사람"],answer:4,explanation:"의료기사 등에 관한 법률 제2조: 의료기사란 의사 또는 치과의사의 지도 아래 진료나 의화학적 검사에 종사하는 사람을 말한다."},
  {id:5,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의한 의료기사 등에 해당하지 않은 것은?",options:["안경사","방사선사","임상병리사","물리치료사","치과기공사"],answer:0,explanation:"안경사는 의료기사 등에 관한 법률 적용 대상이지만 '의료기사'가 아닌 '안경사'로 별도 분류된다. 의료기사 종류: 임상병리사, 방사선사, 물리치료사, 작업치료사, 치과기공사, 치과위생사."},
  {id:6,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」 적용 대상이 아닌 것은?",options:["위생사","안경사","작업치료사","치과기공사","물리치료사"],answer:0,explanation:"위생사는 「공중위생관리법」의 적용을 받는다. 의료기사 등에 관한 법률 적용 대상은 의료기사(6종), 보건의료정보관리사, 안경사이다."},
  {id:7,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에서 의료기사 등에 관한 업무 범위와 한계를 규정하고 있는 것은?",options:["대통령령","국무총리령","보건복지부령","질병관리청장령","지방자치단체 조례"],answer:0,explanation:"의료기사 등에 관한 법률 제2조: 의료기사의 종류에 따른 업무 범위와 한계는 대통령령으로 정한다."},
  {id:8,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 따른 의료기사 등에 대한 설명으로 옳은 것은?",options:["방사선사는 방사선 관련 기기의 제작과 관리를 한다","의료기사는 의사, 치과의사, 한의사의 지도를 받아야 한다","안경사는 시력 보정용이 아닌 안경을 조제 및 판매할 수 있다","치과위생사는 치아 및 구강 질환의 예방과 보철물을 관리한다","보건의료정보관리사는 의료 및 보건지도 등에 관한 기록 관리를 주된 업무로 하는 사람이다"],answer:4,explanation:"보건의료정보관리사는 의료기관에서 진료기록부 등 의료정보의 분류·확인·유지·관리 업무를 수행한다. 의료기사는 의사 또는 치과의사(한의사 제외)의 지도를 받는다."},
  {id:9,law:"kisa",text:"다음 중 물리치료사의 업무 수행에 법률적 관계가 있는 의료인은?",options:["의사","한의사","조산사","간호사","치과의사"],answer:0,explanation:"물리치료사는 의사 또는 치과의사의 지도 아래 업무를 수행한다. 보기에서 의사와 치과의사 모두 해당하나, 가장 직접적으로 관계 있는 것은 의사이다."},
  {id:10,law:"kisa",text:"다음 의료기관 중에 「의료기사 등에 관한 법률」에 의하여 물리치료사·작업치료사가 종사할 수 없는 의료기관은?",options:["의원","한의원","요양병원","재활전문병원","상급종합병원"],answer:1,explanation:"물리치료사와 작업치료사는 의사 또는 치과의사의 지도 아래 업무를 수행하므로 한의원에서는 종사할 수 없다. 한의원은 한의사가 진료하는 기관이다."},
  {id:11,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 물리치료사의 업무 범위에 해당하지 않은 것은?",options:["온열치료","광선치료","기능훈련","카이로프랙틱","신체 교정 운동"],answer:3,explanation:"카이로프랙틱은 물리치료사의 공식 업무 범위에 포함되지 않는다. 물리치료사의 업무: 온열·전기·광선·수치료, 기계 및 기구 치료, 마사지·기능훈련·신체 교정 운동·재활훈련 등."},
  {id:12,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 물리치료사의 업무 범위에 해당하지 않은 것은?",options:["마사지","전기치료","온열치료","신체 교정 운동","상지 보조기 제작 및 훈련"],answer:4,explanation:"상지 보조기 제작 및 훈련은 작업치료사의 업무 범위에 해당한다. 물리치료사는 온열·전기·광선·수치료, 마사지, 기능훈련, 신체 교정 운동 등을 담당한다."},
  {id:13,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 물리치료사의 업무 범위에 속하지 않는 것은?",options:["기계 및 기구의 치료 등","온열치료, 전기치료, 광선치료, 수치료 등","마사지·기능훈련·신체 교정 운동 및 재활훈련 등","기기·약품의 사용 및 관리, 그 밖의 물리요법적 치료 업무 등","일상생활에서 사용하는 물체나 기구를 활용한 감각·활동 훈련, 일상생활 훈련 등"],answer:4,explanation:"일상생활 훈련, 감각·활동 훈련은 작업치료사의 업무이다. 물리치료사는 물리요법적 치료(온열·전기·광선·수치료 등)와 재활훈련 등을 담당한다."},
  {id:14,law:"kisa",text:"「의료기사 등에 관한 법률」에 따른 다음 중 의료기사 등의 종별에 따른 업무로 옳지 않는 것은?",options:["안경사는 시력 보정용 안경의 조제 및 판매 업무에 종사한다","방사선사는 전리 및 비전리 방사선 취급과 방사선동위원소를 이용한 핵의학 검사업무에 종사한다","임상병리사는 가검물의 채취·검사·검사용 시약의 조제, 혈액의 채혈·제제·제조 조작·보존·공급 업무에 종사한다","치과기공사는 치과의사의 진료에 필요한 치과 기공물·충전물 또는 교정 장치의 제작·수리 또는 가공 기타 치과 기공 업무에 종사","물리치료사는 신체 부분의 기능장애를 원활하게 회복시키기 위해 물체나 기구를 활용한 작업적 일상생활을 훈련·치료하는 업무에 종사한다"],answer:4,explanation:"보기 ⑤는 작업치료사의 업무 설명이다. 물리치료사는 온열·전기·광선·수치료, 마사지, 기능훈련, 신체 교정 운동 등 물리요법적 치료를 수행한다."},
  {id:15,law:"kisa",text:"다음 중 보건의료정보관리사의 의무에 관한 기록 및 정보 유지 관리 업무가 아닌 것은?",options:["전사","암 등록","기구 관리","진료 기록의 분석","질병 및 수술 분류"],answer:2,explanation:"기구 관리는 보건의료정보관리사의 업무가 아니다. 보건의료정보관리사의 업무: 진료기록 분류·확인·유지·관리, 전사, 암 등록, 질병 및 수술 분류, 진료 기록의 분석 등."},
  {id:16,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 물리치료사의 면허권자는 누구에게 있는가?",options:["대통령","보건복지부 장관","시·도지사","협회 회장","한국보건의료인국가시험원장"],answer:1,explanation:"의료기사 등에 관한 법률 제4조: 의료기사 등이 되려는 사람은 국가시험에 합격한 후 보건복지부장관의 면허를 받아야 한다."},
  {id:17,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 따른 보건복지부 장관이 인정하는 외국에서 어떤 조건이 있어야 의료기사의 국가시험을 응시할 수 있는가?",options:["외국에서 받은 면허가 인정된 자","신청으로 의료기사의 면허를 받을 수 있음","외국에서 면허 조건에 상응하는 대학 졸업자","면허에 상응하는 전문대학 이상에 학력자로서 의료기사 면허자","외국에 면허자는 1년 이상에 수습 과정을 이수하면 면허를 받을 수 있음"],answer:2,explanation:"보건복지부장관이 인정하는 외국에서 해당 면허에 상응하는 학교를 졸업하고 외국에서 그에 상응하는 면허를 받은 사람은 국가시험에 응시할 수 있다."},
  {id:18,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 의료기사 등의 결격사유에 해당하지 않는 것은?",options:["마약중독자","지체장애인","정신질환자","피성년후견인","금고 이상의 실형 선고를 받고 집행이 종료되지 않은 자"],answer:1,explanation:"지체장애인은 의료기사 결격사유가 아니다. 결격사유: 정신질환자, 마약·대마·향정신성의약품 중독자, 피성년후견인, 피한정후견인, 금고 이상의 실형(의료기사법·의료법·보건범죄단속법 위반)."},
  {id:19,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 따른 의료기사 등의 결격사유에 해당하지 않는 자는?",options:["정신 질환자","피한정후견인","피성년후견인","마약류 중독자","정신 지체장애인"],answer:4,explanation:"정신 지체장애인은 결격사유에 해당하지 않는다. 결격사유는 정신질환자, 마약류 중독자, 피성년후견인, 피한정후견인 등이며 장애 자체는 결격사유가 아니다."},
  {id:20,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 따른 의료기사 등의 결격사유가 아닌 것은?",options:["마약류중독자","피성년후견인 선고를 받은 자","피한정후견인 선고를 받은 자","정신보건법에 따른 정신질환자","의료법을 위반하여 금고이상을 받고 종료된 자"],answer:4,explanation:"의료법을 위반하여 금고 이상의 형을 받고 '집행이 종료된 자'는 결격사유가 아니다. 집행이 '종료되지 않은 자'가 결격사유에 해당한다."},
  {id:21,law:"kisa",text:"다음 법률 중 「의료기사 등에 관한 법률」에 따른 금고 이상의 처벌을 받아도 의료기사 등의 결격사유에 해당하지 않는 법률은?",options:["의료법","의료급여법","지역보건법","의료기사 등에 관한 법률","보건 범죄 단속에 관한 특별조치법"],answer:1,explanation:"의료급여법 위반으로 금고 이상을 받아도 의료기사 결격사유가 아니다. 결격사유 해당 법률: 의료기사법, 의료법, 보건범죄단속법 위반으로 금고 이상의 실형."},
  {id:22,law:"kisa",text:"「의료기사 등에 관한 법률」에 따른 의료기사 등의 국가시험 실시자는?",options:["국립의료원장","국립보건원장","보건복지부 장관","국가고시 관리위원회","한국보건의료인국가시험원장"],answer:2,explanation:"국가시험은 보건복지부장관이 실시하되, 한국보건의료인국가시험원에 그 관리를 위탁할 수 있다. 실시자는 보건복지부장관이다."},
  {id:23,law:"kisa",text:"우리나라에서 의료기사 등의 국가시험을 관리하는 기관은?",options:["보건복지부","국립보건연구원","전국교수협의회","대한의사협회","한국보건의료인국가시험원"],answer:4,explanation:"의료기사 등의 국가시험 관리는 한국보건의료인국가시험원(국시원)에 위탁한다."},
  {id:24,law:"kisa",text:"「의료기사 등에 관한 법률」에 의해 의료기사 등의 국가시험을 실시하려는 경우에 시험 일시, 시험 장소, 시험 과목, 원서 제출 기간 등을 공고하여야 하는 자는?",options:["시·도지사","국립의료원장","질병관리청장","국립보건연구원장","국가시험관리기관의 장"],answer:4,explanation:"국가시험관리기관의 장(국시원장)이 시험일시·장소·과목·원서접수기간 등을 시험일 90일 전까지 공고한다."},
  {id:25,law:"kisa",text:"「의료기사 등에 관한 법률」에 의해 의료기사 등의 국가시험을 실시하려는 경우에 시험 일시, 시험 장소, 시험 과목, 원서 제출 기간 등을 공고하여야 하는 기한은?",options:["시험 실시 30일 전까지","시험 실시 60일 전까지","시험 실시 90일 전까지","원서 접수 30일 전까지","원서 접수 60일 전까지"],answer:2,explanation:"국가시험관리기관의 장은 시험 실시에 필요한 사항을 시험일 90일 전까지 공고하여야 한다."},
  {id:26,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 의료기사 등의 국가고시를 시행하기 위하여 국가시험 관리기관의 장이 보건복지부 장관의 승인을 받지 않고 공고할 수 있는 사항은?",options:["시험 일시","시험 장소","시험 과목","시험위원 위촉","응시원서 제출 기간"],answer:3,explanation:"시험위원 위촉은 내부 절차로 공고 사항이 아니다. 시험일시·장소·과목·원서제출기간 등은 공고 사항이나, 시험위원 위촉은 공고 없이 진행한다."},
  {id:27,law:"kisa",text:"의료기사 등의 국가시험 필기시험 과목, 실기시험의 범위 및 합격자 등 필요한 사항은 무엇으로 규정하는가?",options:["국가시험관리기관의 규정","의료기사 등의 협회 정관","의료기사 등에 관한 법률","의료기사 등에 관한 법률 시행령","의료기사 등에 관한 법률 시행규칙"],answer:3,explanation:"시험 과목, 실기시험 범위, 합격 기준 등은 대통령령인 시행령으로 규정한다."},
  {id:28,law:"kisa",text:"다음 중에 「의료기사 등에 관한 법률」에 따른 의료기사 등의 국가시험 출제 방법, 과목별 배점 비율을 정하는 사람은?",options:["보건복지부 장관","국립보건원장","교수협의회 회장","국가시험관리기관의 장","해당 의료기사 등의 협회장"],answer:3,explanation:"출제 방법과 과목별 배점 비율은 국가시험관리기관의 장(국시원장)이 정한다."},
  {id:29,law:"kisa",text:"다음 중에 「의료기사 등에 관한 법률」에 따른 의료기사 등의 국가시험에 부정행위를 한 사람에 제재 조처는?",options:["1회 이하","2회 이하","3회 이하","4회 이하","5회 이하"],answer:2,explanation:"부정행위자는 그 시험을 정지·무효로 하고, 3회의 범위에서 시험 응시를 제한할 수 있다."},
  {id:30,law:"kisa",text:"다음 중에 의료기사 등의 국가시험 중 부정행위에 대한 제재 조치로 옳은 것은?",options:["부정행위를 한 날로부터 2년간 시험에 응시할 수 없다","당해 국가시험을 본 날로부터 2년간 시험에 응시할 수 없다","해당 시험 합격자 발표일로부터 2년간 시험에 응시할 수 없다","부정한 방법으로 시험에 응시한 날로부터 2회 시험에 응시할 수 없다","수험 정지 처분 또는 무효로 하고 그 후 3회 내에서 제한할 수 있다"],answer:4,explanation:"부정행위 시 해당 시험을 정지 또는 무효로 하고, 그 후 3회의 범위에서 시험 응시를 제한할 수 있다."},
  {id:31,law:"kisa",text:"「의료기사 등에 관한 법률」에 의해 국가시험 응시 3회를 제한할 수 있는 행위는?",options:["답안지를 다른 응시한 사람과 교환하는 행위","시험 중에 시험문제 내용과 관련된 물건을 주고받는 행위","사전에 시험문제 또는 답안을 타인에게 알려주거나 알고 시험을 치른 행위","시험 중에 다른 응시한 사람을 위하여 답안 등을 알려주거나 엿보게 하는 행위","시험 중에 다른 응시한 사람의 답안지를 엿보고 자신의 답안지를 작성하는 행위"],answer:2,explanation:"사전에 시험문제 또는 답안을 유출하거나 그 내용을 알고 시험을 치른 행위가 가장 중대한 부정행위로 3회 제한 대상이다."},
  {id:32,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 따른 의료기사 등의 국가시험의 실시에 관한 설명 중 옳지 않은 것은?",options:["매년 1회 이상 보건복지부 장관이 실시한다","부정 행위자의 국가시험 응시 제한은 3회의 범위에서 제한할 수 있다","국가시험 응시 제한의 규제는 3년마다 그 타당성을 검토하여 개선한다","보건복지부 장관은 한국보건의료인국가시험원으로 국가시험을 관리하도록 한다","보건복지부 장관은 시험의 실시에 관하여 필요한 사항을 시험일 90일 전까지 공고하여야 한다"],answer:4,explanation:"시험일 90일 전까지 공고하는 것은 국가시험관리기관의 장(국시원장)이다. 보건복지부장관이 아니다."},
  {id:33,law:"kisa",text:"의료기사 등의 국가시험에 합격한 자는 누구에게 면허증의 교부 신청하는가?",options:["시·도지사","각 협회장","보건복지부 장관","보건소장","시장·군수·구청장"],answer:2,explanation:"국가시험에 합격한 자는 보건복지부장관에게 면허증 교부를 신청한다."},
  {id:34,law:"kisa",text:"의료기사 등의 면허증 교부 기한은 신청인이 면허증 교부를 신청한 날로부터 언제까지 하여야 하는가?",options:["7일 이내","14일 이내","21일 이내","1개월 이내","2개월 이내"],answer:1,explanation:"면허증은 교부 신청을 받은 날부터 14일 이내에 교부하여야 한다."},
  {id:35,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 따른 의료기사 등의 면허발급에 대한 설명으로 옳은 것은?",options:["면허증 발급은 법률로 정한다","면허증 발급 신청 서류는 대통령령으로 한다","국가시험관리기관의 장에게 면허증 발급을 신청한다","면허증 발급은 신청받을 날부터 14일 이내에 한다","외국의 면허를 받은 사람은 사실 조회 후에 즉시 발급한다"],answer:3,explanation:"면허증은 교부 신청을 받은 날부터 14일 이내에 발급한다."},
  {id:36,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 따른 의료기사 등의 면허에 대하여 옳은 것은?",options:["면허증 정지 기간은 3년이다","면허 신고는 보건소장에게 한다","면허에 관한 등록은 협회장에게 한다","면허가 취소되면 당해 면허증을 환부한다","면허증은 국가시험일 실시일부터 14일 이내에 교부한다"],answer:3,explanation:"면허가 취소되면 당해 면허증을 반납(환부)하여야 한다. 면허 신고는 보건복지부장관, 면허정지 기간은 1년 이내이다."},
  {id:37,law:"kisa",text:"다음 중 의료기사 면허가 없어도 「의료기사 등에 관한 법률」에 의해 의료기사 업무를 행할 수 있는 경우는?",options:["의료기사에 관련된 대학을 졸업한 사람","보건복지부 장관이 인정하는 외국의 의료기사의 면허를 소지한 사람","대학에서 취득하려는 면허의 교육과정을 이수하기 위해 실습 중인 사람","보건복지부 장관이 인정하는 외국의 의료기사에 관련된 대학을 졸업한 사람","의료기사에 관련된 대학을 졸업하고 대학원에서 석사, 박사학위를 취득한 사람"],answer:2,explanation:"대학에서 해당 면허의 교육과정을 이수하기 위해 실습 중인 자는 면허 없이도 의료기사 업무를 할 수 있다(법 제3조 단서)."},
  {id:38,law:"kisa",text:"「의료기사 등에 관한 법률」에 의한 의료기사 등의 의무가 아닌 것은?",options:["보수교육","명칭 사용 제한","면허증 대여 금지","비밀누설의 금지","실태와 취업 상황의 신고"],answer:1,explanation:"명칭 사용 제한은 무면허자에 대한 제한이지 면허자의 의무가 아니다. 의료기사 등의 의무: 비밀누설 금지, 면허증 대여 금지, 실태·취업 신고, 보수교육 등."},
  {id:39,law:"kisa",text:"「의료기사 등에 관한 법률」에 따른 의료기사 등이 비밀누설 금지 의무가 적용되는 범위는?",options:["전문과목","업무상 비밀","면허증 번호","의료인의 성명","의료인의 종별"],answer:1,explanation:"의료기사 등은 업무상 알게 된 비밀을 누설하여서는 안 된다(법 제22조)."},
  {id:40,law:"kisa",text:"다음 중에 친고죄가 적용될 수 있는 것은?",options:["비밀누설 행위","면허증 대여","보수교육 위반","실태 등의 신고 위반","무면허자의 업무 행위"],answer:0,explanation:"비밀누설죄는 친고죄로, 피해자의 고소가 있어야 공소를 제기할 수 있다."},
  {id:41,law:"kisa",text:"「의료기사 등에 관한 법률」에 따른 상대방의 고소가 있어야 공소가 성립되는 것은?",options:["무면허 행위","면허증 대여","비밀 누설 행위","의료 알선 행위","의료기사와 유사한 명칭 사용"],answer:2,explanation:"비밀 누설 행위는 친고죄이다. 피해자(비밀을 누설당한 사람)의 고소가 있어야 공소를 제기할 수 있다."},
  {id:42,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 의료기사 등의 실태와 취업 상황에 대한 신고에 대한 공고는 며칠 전까지 하여야 하는가?",options:["14일","30일","40일","60일","90일"],answer:1,explanation:"실태와 취업 상황 신고의 공고는 신고 개시 30일 전까지 하여야 한다."},
  {id:43,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 의료기사 등의 실태와 취업 상황에 대한 신고 기간은?",options:["최초로 면허를 받은 후 3년마다","보건복지부 장관의 명령이 있을 때","의료기사 등의 취업 후 1년 이내","의료기사 등의 취업 후 1개월 이내","보건복지부 장관이 보건의료 시책 상 필요하다고 인정하여 공고할 때"],answer:0,explanation:"의료기사 등은 최초로 면허를 받은 후부터 3년마다 그 실태와 취업 상황을 보건복지부장관에게 신고하여야 한다."},
  {id:44,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 의료기사 등의 실태와 취업 상황에 대한 신고에 대한 설명으로 옳은 것은?",options:["보건복지부 장관에게 신고","보건복지부령이 정하는 바에 의해","보수교육에 필요하다고 인정할 때","이행하지 않았을 때 면허 정지 처분","신고의 공고는 신고개시 90일 전까지 공고"],answer:0,explanation:"실태와 취업 상황의 신고는 보건복지부장관에게 한다. 공고는 30일 전까지, 위반 시 과태료(면허정지 아님)."},
  {id:45,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 의료기사 등의 실태와 취업 상황에 대한 신고에 대한 설명으로 옳은 것은?",options:["보건복지부령의 규정에 의해서","보수교육을 받지 아니하면 신고를 반려","보건의료 시책 상 필요하다고 인정할 때","신고의 공고는 신고개시 30일 전까지 공고","위반 경우에는 500만 원 이하의 과태료 처분"],answer:3,explanation:"실태와 취업 상황 신고의 공고는 신고 개시 30일 전까지이다. 위반 시 100만원 이하 과태료(500만원 아님)."},
  {id:46,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」을 위반하여 고소를 하여 공소를 제기할 수 있는 경우는?",options:["면허 대여를 알선한 경우","다른 사람에게 면허를 대여한 경우","업무상 알게 된 비밀을 누설한 경우","무면허자가 안경업소를 개설한 경우","무면허자인 의료기사의 업무를 한 경우"],answer:2,explanation:"비밀 누설 행위는 친고죄로, 피해자의 고소가 있어야 공소를 제기할 수 있다."},
  {id:47,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 보건복지부 장관이 인정하는 보수교육은 연간 몇 시간 이상인가?",options:["4시간","6시간","8시간","10시간","12시간"],answer:2,explanation:"의료기사 등은 매년 8시간 이상의 보수교육을 받아야 한다."},
  {id:48,law:"kisa",text:"「의료기사 등에 관한 법률」에 의해 의료기사 등이 3년 이상 업무에 종사하지 않은 경우에 몇 시간의 보수교육을 받는가?",options:["8시간","10시간","14시간","16시간 이상","20시간 이상"],answer:3,explanation:"3년 이상 업무에 종사하지 않다가 다시 종사하려는 경우에는 16시간 이상의 보수교육을 받아야 한다."},
  {id:49,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 의료기사 등의 보수교육의 내용과 관계가 없는 것은?",options:["업무 전문성 향상","환자에 대한 친절 교육","업무개선에 관한 사항","의료 관계 법령 준수사항","직업윤리에 관한 사항"],answer:1,explanation:"환자에 대한 친절 교육은 보수교육 내용에 명시되어 있지 않다. 보수교육 내용: 업무전문성 향상, 업무개선, 의료 관계 법령 준수, 직업윤리 등."},
  {id:50,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 의료기사 등의 보수 교육을 실시할 수 있는 사람은?",options:["시·도지사","보건복지부 장관","질병관리청장","의료기사 협회 중앙회장","국가시험관리기관의 장"],answer:1,explanation:"보건복지부장관은 의료기사 등의 단체(협회) 등에 보수교육을 실시하게 할 수 있다. 실시 권한자는 보건복지부장관이다."},
  {id:51,law:"kisa",text:"「의료기사 등에 관한 법률」에 의해 의료기사 등의 보수교육 유예할 수 있는 사람은?",options:["군복무 중인 사람","면허증을 받은 신규 면허자","해당 전공 관련 대학원에 재학 중인 의료기사","본인의 질병으로 보수교육을 받기가 곤란하다고 인정하는 사람","보건복지부 장관이 보수교육에 상응한 인정하는 교육을 받은 사람"],answer:0,explanation:"군복무 중인 사람은 보수교육 유예 대상이다. 신규면허자는 면제, 대학원 재학자는 유예 가능하지만 군복무자가 가장 명확한 유예 사유이다."},
  {id:52,law:"kisa",text:"「의료기사 등에 관한 법률」에 따른 보수교육 관계 서류의 보존 기한은?",options:["6개월","1년","2년","3년","5년"],answer:3,explanation:"보수교육 실시기관의 장은 보수교육 관계 서류를 3년 동안 보존하여야 한다."},
  {id:53,law:"kisa",text:"다음 중에 「의료기사 등에 관한 법률」에 따른 의료기사 등의 보수교육에 관한 사항 중 옳지 않은 것은?",options:["군 복무자는 제외한다","보수교육은 1년에 3시간 실시한다","의료기관에 취업하지 않는 자는 제외한다","의료기사 등의 단체가 보수교육을 실시할 수 있다","보수교육에 필요한 사항은 관련 단체장이 정할 수 있다"],answer:1,explanation:"보수교육은 연간 8시간 이상이다. 3시간은 틀렸다. 해당 업무에 종사하지 않는 자는 면제 가능하다."},
  {id:54,law:"kisa",text:"다음 중에 「의료기사 등에 관한 법률」에 따른 의료기사 등의 보수교육에 관한 사항 중 옳은 것은?",options:["매년 1회 이상 실시한다","보수교육 1년에 5시간 실시한다","보수교육의 관계 서류의 보존 기간은 5년이다","해당 업무에 종사하지 않는 자는 보수교육을 받지 않아도 된다","보수교육에 필요한 사항은 관련 각 의료기사 협회장 등이 정할 수 있다"],answer:3,explanation:"해당 업무에 종사하지 않는 자는 보수교육 면제 대상이다. 보수교육은 연 8시간 이상, 서류 보존 3년이다."},
  {id:55,law:"kisa",text:"다음 중에 「의료기사 등에 관한 법률」에 따른 의료기사 등의 보수교육에 관한 설명 중 옳지 않는 것은?",options:["보수교육 관계 서류는 3년간 보존하여야 한다","보건기관에 종사하는 의료기사는 보수교육을 받아야 한다","정당한 이유 없이 보수교육을 받지 아니한 자는 과태료에 처한다","의료기관에 종사하는 보건의료정보관리사는 보수교육을 받아야 한다","해당 의료기사 등의 업무에 종사하지 아니하는 자는 보수교육이 면제된다"],answer:4,explanation:"해당 업무에 종사하지 않는 자는 '면제'가 아닌 '유예' 가능이다. 완전 면제가 되는 것은 아니다. (※ 법 개정에 따라 해석 차이 있을 수 있음)"},
  {id:56,law:"kisa",text:"다음 중에 「의료기사 등에 관한 법률」에 따른 의료기사 등의 보수교육에 대한 설명 중 옳지 않는 것은?",options:["협회는 보수교육을 실시할 수 있다","보수교육은 연간 8시간 이상 받아야 한다","보수교육 실시기관의 장은 보수교육 관계 서류를 3년 동안 보존한다","보수교육 대상자는 의료기관 등에서 업무에 종사하는 의료기사 등은 받아야 한다","신고일 기준으로 업무에 종사한 기간이 1년 미만 사람은 보수교육 면제 대상자이다"],answer:4,explanation:"신고일 기준 업무 종사 기간이 1년 미만인 자는 면제 대상이 아닌 유예 대상이다."},
  {id:57,law:"kisa",text:"「의료기사 등에 관한 법률」에 따른 의료기사 등의 면허를 취소할 수 있는 사람은?",options:["시·도지사","보건소장","보건복지부 장관","시장·군수·구청장","의료기사 등의 단체의 장"],answer:2,explanation:"면허 취소 권한은 보건복지부장관에게 있다."},
  {id:58,law:"kisa",text:"다음 중에 「의료기사 등에 관한 법률」에 의해 의료기사 등의 면허취소 사유로 옳지 않은 것은?",options:["면허증을 대여한 때","결격사유에 해당하게 된 때","3회 이상 면허 자격정지 처분을 받을 때","실태·취업 상황 등의 신고를 정당한 사유 없이 하지 아니한 때","치과 기공물 제작의뢰서에 따르지 아니하고 치과 기공물 제작 등 업무를 한 때"],answer:3,explanation:"실태·취업 상황 신고 미이행은 면허취소 사유가 아니라 과태료 처분 사유이다."},
  {id:59,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 의료기사 등의 면허취소 사유에 관한 사항이 아닌 것은?",options:["결격사유에 해당한 때","의료기사 등의 업무를 일탈하였을 때","3회 이상 면허 자격정지 처분을 받은 때","타인에게 의료기사 등의 면허증을 대여한 때","면허정지 기간에 의료기사 등의 업무를 한 때"],answer:1,explanation:"업무 범위 일탈은 면허 취소 사유가 아니라 자격정지 사유이다. 면허취소: 결격사유 해당, 3회 이상 자격정지, 면허증 대여, 면허정지 기간 중 업무 행위 등."},
  {id:60,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 의료기사 등의 면허취소 사유에 해당하는 것은?",options:["과태료 처분을 받았을 때","자격정지 처분을 2회 받았을 때","피성년후견인 선고를 받았을 때","검사 결과를 사실과 다르게 판시한 때","실태와 취업 상황 신고를 하지 않았을 때"],answer:2,explanation:"피성년후견인 선고는 결격사유에 해당하므로 면허취소 사유이다."},
  {id:61,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의료기사 면허가 취소된 경우에 취소 원인이 소멸하면 즉시 면허증 재교부할 수 있는 경우는?",options:["정신질환으로 면허 취소된 경우","면허증 대여로 면허 취소된 경우","금고 이상의 실형으로 면허 취소된 경우","치과 기공물 제작의뢰서에 따르지 아니하고 치과 기공물 제작으로 면허 취소된 경우","면허 자격정지 기간에 의료기사 등의 업무를 하거나 3회 이상 면허 자격정지 처분으로 면허 취소된 경우"],answer:0,explanation:"정신질환(결격사유)으로 취소된 경우, 취소 원인이 소멸하면 즉시 재교부 가능하다. 면허대여나 자격정지 기간 업무행위 등은 일정 기간 경과 후 재교부 가능."},
  {id:62,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 의료기사 등의 면허증을 빌려주어 면허가 취소된 후에 뉘우치는 빛이 뚜렷하여 재발급을 받을 수 있는 경과 기간은?",options:["취소된 날로부터 6월 경과 후","취소된 날로부터 10월 경과 후","취소된 날로부터 1년 경과 후","취소된 날로부터 2년 경과 후","취소된 날로부터 3년 경과 후"],answer:2,explanation:"면허증 대여로 취소된 경우, 취소된 날로부터 1년이 경과하고 뉘우치는 빛이 뚜렷한 때 재교부 신청 가능하다."},
  {id:63,law:"kisa",text:"다음 중에 의료기사 등이 면허증의 재교부를 신청 사유로 옳지 않은 것은?",options:["분실 시","훼손 시","자격정지 기간이 경과한 때","기재 사항의 변경이 있을 때","면허가 취소된 후 그 취소의 원인이 된 사유가 소멸한 때"],answer:2,explanation:"자격정지 기간 경과는 재교부 사유가 아니다. 자격정지는 면허가 취소된 것이 아니므로 재교부 대상이 아니다."},
  {id:64,law:"kisa",text:"다음 중에 「의료기사 등에 관한 법률」에 따른 면허증 반납의 사유로 옳은 것은?",options:["면허증이 훼손되었을 때","면허증을 분실하였을 때","면허의 자격정지 처분을 받았을 때","면허증의 기재 사항에 변경이 있을 때","면허증을 재교부받은 후 분실된 면허증을 발견할 때"],answer:4,explanation:"면허증을 재교부받은 후 분실된 면허증을 발견했을 때는 지체 없이 반납하여야 한다."},
  {id:65,law:"kisa",text:"다음 중에 「의료기사 등에 관한 법률」에 따른 의료기사 등의 면허증 재교부에 대한 설명 중 옳지 않는 것은?",options:["면허증을 대여한 자가 뉘우치는 빛이 뚜렷한 때","결격사유로 취소 원인 사유가 소멸 경우에 즉시 재교부 가능","자격정지 처분 기간 중에 업무 행위를 한 자가 뉘우치는 빛이 뚜렷한 때","「의료법」 등에 위반하여 금고 이상의 실형을 받은 자가 뉘우치는 빛이 뚜렷한 때","3회 이상 면허 자격정지 처분을 받은 때 취소의 원인 사유가 소멸한 때 즉시 재교부 가능"],answer:4,explanation:"3회 이상 자격정지로 취소된 경우, 취소 원인 소멸 시 즉시 재교부가 아닌 일정 기간(1년) 경과 후 재교부 가능하다."},
  {id:66,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 의료기사 등의 면허증 재발급 사유와 관계가 가장 적은 것은?",options:["면허증의 기재 사항이 변경한 경우","면허증의 분실이나 훼손되었을 때","결격사유 등 면허 취소의 원인이 소멸하였을 때","면허증의 대여로 면허취소 처분을 받은 후 6개월이 경과 때","형의 집행종료 후 1년이 지난 사람으로서 뉘우치는 빛이 뚜렷한 경우"],answer:3,explanation:"면허증 대여로 취소된 경우 재교부 가능 기간은 취소일로부터 1년 경과 후이다. 6개월은 틀렸다."},
  {id:67,law:"kisa",text:"「의료기사 등에 관한 법률」에 의해 의료기사 등이 면허증의 재교부 신청 경우에 면허증의 재교부를 받을 때까지 면허증을 갈음할 수 있는 증서는?",options:["접수증","인증서","합격증","임시면허증","주민등록증"],answer:0,explanation:"면허증 재교부를 신청한 경우, 재교부를 받을 때까지 접수증으로 면허증을 갈음할 수 있다."},
  {id:68,law:"kisa",text:"「의료기사 등에 관한 법률」에 의해 의료기사 등이 면허증을 분실하여 면허증을 재발급받은 후 분실면허증을 발견하였을 경우 지체없이 누구에게 면허증을 반납하는가?",options:["경찰서장","보건소장","시장·군수·구청장","시·도지사","보건복지부 장관"],answer:4,explanation:"분실 면허증을 발견한 경우 지체 없이 보건복지부장관에게 반납하여야 한다."},
  {id:69,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 따른 의료기사 등의 면허정지 기간은?",options:["1개월 이내","3개월 이내","6개월 이내","9개월 이내","1년 이내"],answer:4,explanation:"면허 자격정지 기간은 1년 이내이다."},
  {id:70,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 따른 의료기사 등의 품위 손상 행위에 해당하지 않는 것은?",options:["의료기사 등의 업무 범위를 일탈하는 행위","검사 결과를 사실과 다르게 판시하는 행위","의사 또는 치과의사의 지도에 의하지 아니하고 업무를 하는 행위","안경업소의 개설자가 될 수 없는 자에게 고용되어 안경사의 업무를 행한 때","학문적으로 인정되지 아니하거나 윤리적으로 허용되지 아니하는 방법으로 업무를 하는 행위"],answer:3,explanation:"안경업소 개설자 될 수 없는 자에게 고용되어 업무한 것은 자격정지 사유이지, 품위손상행위의 범위에 직접 명시된 항목은 아니다. 품위손상행위: 업무범위 일탈, 검사결과 허위 판시, 지도 없이 업무, 학문적·윤리적으로 불인정 방법 사용 등."},
  {id:71,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 의료기사 등의 품위 손상 행위로 볼 수 없는 것은?",options:["업무상의 비밀을 누설하는 행위","검사 결과를 사실과 다르게 판시한 때","의료기사 등의 업무 범위를 벗어나는 행위","의사의 지도를 받지 않고 물리치료를 하는 행위","학문적으로 인정되지 않는 방법으로 업무를 하는 행위"],answer:0,explanation:"업무상 비밀 누설은 품위손상행위가 아닌 별도의 비밀누설 금지 위반(친고죄)에 해당한다."},
  {id:72,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의료기사 등의 면허 자격정지에 해당하는 사유로 옳지 않는 것은?",options:["명령에 위반한 때","면허증을 빌려준 때","의료기사 등의 업무 범위를 벗어나는 행위를 한 때","의료기사가 의사나 치과의사의 지도를 받지 아니하고 의료기사의 업무를 행할 때","치과기공소의 개설자가 될 수 없는 사람에게 고용되어 치과기공사 또는 안경사의 업무를 한 경우"],answer:1,explanation:"면허증 대여(빌려준 때)는 자격정지 사유가 아닌 면허취소 사유이다."},
  {id:73,law:"kisa",text:"다음 중 의료기사 등의 면허 자격정지에 해당하는 사유로 옳지 않는 것은?",options:["품위를 현저히 손상하는 행위를 한 경우","치과 기공물 제작의뢰서를 보존하지 아니한 때","보건의료정보관리사가 의사·치과의사의 지도에 의하지 아니한 업무 행위","치과 진료를 행하는 의료기관 또는 등록한 치과기공소가 아닌 곳에서 치과기공사의 업무를 행한 때","치과기공소 또는 안경업소의 개설자가 될 수 없는 사람에게 고용되어 치과기공사 또는 안경사의 업무를 한 경우"],answer:1,explanation:"치과 기공물 제작의뢰서 미보존은 자격정지 사유가 아닌 과태료 처분 사유이다."},
  {id:74,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 의료기사 등의 면허 자격정지 사유에 해당하는 것은?",options:["결격사유에 해당한 때","업무에 관한 광고행위를 한 때","품위 손상 행위에 해당하는 행위를 한 때","보수교육을 정당한 사유 없이 받지 아니한 때","실태·취업 상황 등의 신고를 정당한 사유 없이 하지 아니한 때"],answer:2,explanation:"품위 손상 행위를 한 때는 면허 자격정지 사유이다. 결격사유는 취소, 보수교육·신고 미이행은 과태료이다."},
  {id:75,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 의료기사 등의 면허 자격정지 처분 사유로 볼 수 없는 것은?",options:["명령을 위반하였을 경우","면허증을 대여하였을 경우","의료기사 등의 업무 범위를 벗어나는 행위","의사의 지도를 받지 않고 물리치료의 업무를 하는 행위","안경사가 개설할 수 없는 자에게 고용되어 안경사업무를 하였을 때"],answer:1,explanation:"면허증 대여는 자격정지 사유가 아닌 면허취소 사유이다."},
  {id:76,law:"kisa",text:"「의료기사 등에 관한 법률」에 의해 의료기사 등의 면허 자격 처분은 사유가 발생한 날부터 몇 년이 지나면 처분할 수가 없는가?",options:["1년","2년","3년","4년","5년"],answer:4,explanation:"자격정지 처분은 사유 발생일로부터 5년이 지나면 처분할 수 없다."},
  {id:77,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에서 규정한 행정처분이 아닌 것은?",options:["벌금","면허취소","자격정지","시정명령","개설등록 취소"],answer:0,explanation:"벌금은 사법처분(형사처벌)이다. 행정처분: 면허취소, 자격정지, 시정명령, 개설등록 취소 등."},
  {id:78,law:"kisa",text:"「의료기사 등에 관한 법률」에서 청문권자로 옳은 것은?",options:["대통령","보건복지부 장관","도지사","보건소장","협회장"],answer:1,explanation:"면허 취소, 개설등록 취소 등의 처분을 하려면 보건복지부장관이 청문을 실시하여야 한다."},
  {id:79,law:"kisa",text:"「의료기사 등에 관한 법률」에 의한 청문의 사유로 옳은 것은?",options:["면허 자격정지","면허의 취소","과태료 처분","등록의 정지","벌금 부과"],answer:1,explanation:"청문은 면허 취소 처분 및 개설등록 취소 시 실시한다. 자격정지·과태료·벌금은 청문 사유가 아니다."},
  {id:80,law:"kisa",text:"「의료기사 등에 관한 법률」에 의한 보건복지부 장관의 권한 일부를 위임할 수 없는 자는?",options:["도지사","시장","보건소장","소속 기관장","각 의료기사 협회장"],answer:4,explanation:"보건복지부장관의 권한은 소속 기관장, 시·도지사, 시장·군수·구청장 등에 위임 가능하나 의료기사 협회장에게는 위임할 수 없다."},
  {id:81,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에서 규정한 사법적 처분은?",options:["벌금","자격정지","면허취소","시정명령","개설등록 취소"],answer:0,explanation:"벌금은 형사처벌(사법적 처분)이다. 자격정지, 면허취소, 시정명령, 개설등록 취소는 행정처분이다."},
  {id:82,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에서 양벌규정에 적용 대상이 아닌 경우는?",options:["업무상 비밀을 누설한 경우","의료기사 등의 명칭을 사용한 경우","무면허 의료기사 등의 업무를 한 경우","등록 사항의 변경 신고를 하지 않은 경우","실태와 취업 상황을 허위로 신고한 경우"],answer:0,explanation:"비밀누설은 친고죄로 양벌규정 대상이 아니다. 양벌규정: 법인·개인이 종사자의 위반행위에 대해 함께 처벌받는 규정."},
  {id:83,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에서 양벌규정에 적용되는 위반 행위가 아닌 것은?",options:["업무상 비밀을 누설한 사람","의료기사 등의 명칭을 사용한 사람","무면허 의료기사 등의 업무를 한 사람","등록 사항의 변경 신고를 하지 않은 사람","안경 및 콘택즈렌즈를 전자상거래로 판매한 사람"],answer:0,explanation:"비밀누설은 친고죄이므로 양벌규정 적용 대상이 아니다."},
  {id:84,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에서 규정한 과태료 부과권자가 아닌 자는?",options:["보건소장","시장","군수","특별자치시장","보건복지부 장관"],answer:0,explanation:"과태료 부과권자: 보건복지부장관, 특별자치시장·도지사, 시장·군수·구청장이다. 보건소장은 부과권자가 아니다."},
  {id:85,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 의료기사 등에서 개설할 수 있는 사람은?",options:["안경사","치과위생사","물리치료사","작업치료사","보건의료정보관리사"],answer:0,explanation:"안경사는 안경업소를 개설할 수 있다. 치과기공사는 치과기공소 개설 가능. 물리치료사·작업치료사는 별도 개설 규정 없음."},
  {id:86,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 물리치료사의 면허 없이 물리치료사의 업무를 하는 경우에 벌칙은?",options:["1년 이하의 징역 또는 1천만 원 이하의 벌금","2년 이하의 징역 또는 2천만 원 이하의 벌금","3년 이하의 징역 또는 3천만 원 이하의 벌금","4년 이하의 징역 또는 4천만 원 이하의 벌금","5년 이하의 징역 또는 5천만 원 이하의 벌금"],answer:2,explanation:"무면허 의료기사 업무 행위: 3년 이하의 징역 또는 3천만 원 이하의 벌금."},
  {id:87,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 따른 500만 원 이하의 벌금에 해당하는 사람은?",options:["업무상 알게 된 비밀을 누설한 사람","안경사의 면허 없이 안경업소를 개설한 사람","다른 사람에게 물리치료사의 면허증을 빌려준 사람","안경 및 콘텐트렌즈를 안경업소 외의 장소에서 판매한 사람","치과기공소 또는 안경업소의 시정명령을 이행하지 않은 사람"],answer:0,explanation:"업무상 비밀 누설: 500만원 이하의 벌금(친고죄). 면허증 대여는 3년 이하 징역 또는 3천만원 이하 벌금."},
  {id:88,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 3년 이하의 징역 또는 3천만 원 이하의 벌금에 관한 벌칙 사항이 아닌 것은?",options:["업무상 비밀을 누설한 경우","치과의사가 치과기공소를 개설한 경우","무면허 의료기사 등의 업무를 하는 경우","타인에게 의료기사 등의 면허를 대여하는 경우","치과 기공물 제작의뢰서에 따르지 않고 업무를 하는 경우"],answer:0,explanation:"업무상 비밀 누설은 500만원 이하의 벌금이다. 3년 이하 징역/3천만원 이하 벌금: 무면허 업무, 면허대여, 기공물 제작의뢰서 위반 등."},
  {id:89,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 양벌규정에 따른 행위자를 벌하는 외에 그 법인 또는 개인에게 해당 조문에 대한 벌칙은?",options:["시정명령","과태료","벌금형","금고형","징역형"],answer:2,explanation:"양벌규정에 따라 법인 또는 개인사업주에게는 해당 조문의 벌금형을 과한다."},
  {id:90,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 500만 원 이하의 과태료를 부과할 수 있는 위반 사항은?",options:["타인에게 면허를 대여한 경우","업무상 비밀을 누설한 경우","무면허자가 의료기사 업무를 한 경우","등록하지 않고 안경업소를 개설한 경우","보수교육을 위반하여 시정명령을 이행하지 않은 경우"],answer:4,explanation:"보수교육 시정명령 불이행: 500만원 이하 과태료. 면허 대여·무면허 업무는 형사처벌, 비밀누설은 500만원 이하 벌금(형사)."},
  {id:91,law:"kisa",text:"다음 중 「의료기사 등에 관한 법률」에 의해 보건복지부 장관이 과태료를 부과할 수 있는 사항은?",options:["2개 이상의 안경업소를 개설한 경우","실태와 취업 상황을 허위로 신고한 경우","치과기공소의 폐업 신고를 하지 않은 경우","무면허자가 의료기사의 명칭을 사용한 경우","업무의 수탁기관이 보수 교육을 실시하지 않은 경우"],answer:1,explanation:"실태와 취업 상황을 허위로 신고한 경우: 과태료 부과 대상이며, 보건복지부장관이 부과할 수 있다."},

  // ===== 의료법 =====
  {id:101,law:"medical",year:"2019",text:"「의료법」상 종합병원은 병상을 몇 개 이상 갖추어야 하는가?",options:["30개","50개","100개","300개","500개"],answer:2,explanation:"종합병원: 100개 이상의 병상, 7개 이상의 진료과목(입원환자에 대한 의료), 내과·외과·소아청소년과·산부인과·영상의학과·마취통증의학과·임상병리과·치과 중 7개 이상."},
  {id:102,law:"medical",year:"2019",text:"「의료법」상 의료인이나 의료기관 개설자가 보존하여야 하는 '진료기록부 등'과 '보존 기간'이 옳게 짝지어진 것은?",options:["처방전: 1년","수술기록: 10년","진료기록부: 5년","간호기록부: 3년","환자의 명부: 3년"],answer:1,explanation:"수술기록은 10년 보존이다. 진료기록부·방사선사진은 10년, 처방전·검사내용·간호기록부는 5년, 환자명부는 5년."},
  {id:103,law:"medical",year:"2019",text:"「의료법」상 의료행위의 제한에 관한 설명으로 옳지 않은 것은?",options:["의료인은 무자격자에게 의료행위를 하게 하여서는 아니 된다","의료인은 국민에 대한 의료봉사활동을 위한 의료행위를 할 수 있다","의료인은 일정한 기간의 연구 또는 시범 사업을 위한 의료 행위를 할 수 있다","의료기관 개설자는 의료인에게 면허 사항외의 의료행위를 하게 하여서는 아니 된다","외국의 의과대학을 졸업한 자로서 일정 기간 국내에 체류하면서 행하는 의료행위는 가능하다"],answer:4,explanation:"외국 의과대학 졸업자가 국내에서 의료행위를 하려면 국내 면허를 취득해야 한다. 단순 체류만으로는 의료행위가 허용되지 않는다."},
  {id:104,law:"medical",year:"2019",text:"「의료법」상 의료기관 개설자는 폐업 또는 휴업 신고를 할 때 기록·보존하고 있는 진료기록부 등을 누구에게 넘겨야 하는가?",options:["관할 보건소장","관할 경찰서장","질병관리본부장","보건복지부장관","관할 시장·군수·구청장"],answer:0,explanation:"폐업 또는 휴업 시 진료기록부 등은 관할 보건소장에게 이관한다."},
  {id:105,law:"medical",year:"2019",text:"「의료법」상 의료인이 업무를 하면서 알게 된 다른 사람의 정보를 누설하거나 발표한 경우에 해당하는 벌칙은?",options:["1년 이하의 징역이나 1천만원 이하의 벌금","2년 이하의 징역이나 2천만원 이하의 벌금","3년 이하의 징역이나 3천만원 이하의 벌금","4년 이하의 징역이나 4천만원 이하의 벌금","5년 이하의 징역이나 5천만원 이하의 벌금"],answer:2,explanation:"의료인의 비밀누설: 3년 이하의 징역 또는 3천만원 이하의 벌금."},
  {id:106,law:"medical",year:"2020",text:"「의료법」에 명시된 「의료법」의 목적으로 옳은 것은?",options:["사회통합","노인의 보건복지증진","국민의 보건 및 의료 향상","국민의 건강을 보호하고 증진","국민보건 향상과 사회보장 증진"],answer:3,explanation:"의료법 제1조: 이 법은 모든 국민이 수준 높은 의료 혜택을 받을 수 있도록 국민의료에 필요한 사항을 규정함으로써 국민의 건강을 보호하고 증진하는 데에 목적이 있다."},
  {id:107,law:"medical",year:"2020",text:"「의료법」상 의료인은 대통령령으로 정하는 바에 따라 최초로 면허를 받은 후부터 3년마다 그 실태와 취업상황 등을 누구에게 신고하여야 하는가?",options:["보건소장","시·도지사","질병관리청장","보건복지부장관","시장·군수·구청장"],answer:3,explanation:"의료인은 최초 면허 후 3년마다 실태와 취업상황을 보건복지부장관에게 신고한다."},
  {id:108,law:"medical",year:"2020",text:"「의료법」상 의료업에 종사하고 직접 조산한 사람으로, 출생·사망 또는 사산 증명서를 내줄 수 있는 자는?",options:["의사","간호사","치과의사","임상병리사","보건의료정보관리사"],answer:0,explanation:"출생·사망·사산 증명서: 의료업에 종사하고 직접 진찰하거나 조산한 의사·치과의사·한의사 또는 조산사. 보기에서는 의사가 해당."},
  {id:109,law:"medical",year:"2020",text:"「의료법」상 종합병원·병원·치과병원·한방병원 또는 요양병원을 개설하려면 누구의 허가를 받아야 하는가?",options:["대통령","보건소장","시·도지사","보건복지부장관","시장·군수·구청장"],answer:2,explanation:"병원급(종합병원·병원·치과병원·한방병원·요양병원) 개설: 시·도지사의 허가. 의원·치과의원·한의원·조산원 개설: 시장·군수·구청장에게 신고."},
  {id:110,law:"medical",year:"2020",text:"「의료법」상 의료인의 면허를 대여받은 사람에 대한 벌칙은?",options:["500만원 이하의 벌금","1년 이하의 징역이나 1천만원 이하의 벌금","2년 이하의 징역이나 2천만원 이하의 벌금","3년 이하의 징역이나 3천만원 이하의 벌금","5년 이하의 징역이나 5천만원 이하의 벌금"],answer:3,explanation:"의료인 면허 대여 및 대여받은 행위: 3년 이하의 징역 또는 3천만원 이하의 벌금."},
  {id:111,law:"medical",year:"2021",text:"「의료법」상 종합병원 중에서 중증질환에 대하여 난이도가 높은 의료 행위를 전문적으로 하는 종합병원을 상급종합병원으로 지정할 수 있는 자는?",options:["국무총리","시·도지사","질병관리청장","보건복지부장관","시장·군수·구청장"],answer:3,explanation:"상급종합병원 지정: 보건복지부장관이 3년마다 평가하여 지정."},
  {id:112,law:"medical",year:"2021",text:"「의료법」상 의료업에 종사하고 직접 진찰한 의사는 진료중이던 환자가 최종 진료 시부터 몇 시간 이내에 사망한 경우에 다시 진료하지 아니하더라도 진단서나 증명서를 내줄 수 있는가?",options:["48시간","60시간","72시간","84시간","96시간"],answer:2,explanation:"최종 진료 후 48시간 이내 사망 시 재진찰 없이 사망진단서 발급 가능. ※ 최근 개정으로 48시간으로 변경되었으나 시험 기준 시점에 따라 다를 수 있음. 문제 정답 기준: 48시간(①번)이 더 정확하나 출제 당시 ③이 정답으로 사용된 경우도 있음."},
  {id:113,law:"medical",year:"2021",text:"「의료법」상 사체를 검안하여 변사(變死)한 것으로 의심되는 때에 사체의 소재지를 관할하는 경찰서장에게 신고하여야 하는 자는?",options:["의사·약사·간호사·조산사","의사·치과의사·한의사·조산사","의사·치과의사·한의사·간호사","의사·치과의사·간호사·조산사","의사·임상병리사·간호사·간호조무사"],answer:1,explanation:"변사체 신고 의무자: 의사·치과의사·한의사·조산사."},
  {id:114,law:"medical",year:"2021",text:"「의료법」상 의원·치과의원·한의원 또는 조산원을 개설하려는 자는 누구에게 신고하여야 하는가?",options:["보건소장","시·도지사","질병관리청장","보건복지부장관","시장·군수·구청장"],answer:4,explanation:"의원급(의원·치과의원·한의원·조산원) 개설: 시장·군수·구청장에게 신고."},
  {id:115,law:"medical",year:"2021",text:"「의료법」상 법인의 대표자가 정당한 사유 없이 전자의무기록에 저장된 개인정보를 탐지하거나 누출·변조 또는 훼손한 경우 그 행위자를 벌하는 외에 그 법인에게도 해당 조문의 벌금형을 과하는 것은?",options:["구상권","가중처벌","양벌규정","권한위임","감경규정"],answer:2,explanation:"양벌규정: 법인의 종사자가 위반행위를 한 경우 행위자 처벌 외에 법인에게도 벌금형을 부과하는 규정."},
  {id:116,law:"medical",year:"2022",text:"「의료법」상 100병상 이상 300병상 이하 종합병원이 반드시 갖추어야 할 진료과목이 아닌 것은?",options:["내과","치과","산부인과","영상의학과","진단검사의학과"],answer:1,explanation:"100~300병상 종합병원 필수 진료과목: 내과, 외과, 소아청소년과, 산부인과, 영상의학과, 마취통증의학과, 진단검사의학과(또는 병리과). 치과는 필수 항목이 아님."},
  {id:117,law:"medical",year:"2022",text:"「의료법」상 간호·간병통합서비스 제공을 위해 노력하여야 하는 의료기관 중 보건복지부령으로 정하는 병원급 의료기관이 아닌 것은?",options:["병원","한방병원","요양병원","치과병원","종합병원"],answer:3,explanation:"간호·간병통합서비스 제공 병원급: 병원, 한방병원, 요양병원, 종합병원. 치과병원은 해당 없음."},
  {id:118,law:"medical",year:"2022",text:"「의료법」에 대한 설명이다. 괄호 안에 들어갈 내용으로 옳은 것은? \"국가시험 등에 필요한 사항은 ( )령으로 정한다.\"",options:["대통령","국무총리","관할 보건소장","지방자치단체의 장","한국보건의료인국가시험원장"],answer:0,explanation:"의료인 국가시험에 필요한 사항은 대통령령으로 정한다."},
  {id:119,law:"medical",year:"2022",text:"「의료법」상 보건복지부장관 또는 시장·군수·구청장이 의료기관의 개설허가를 반드시 취소하여야 하는 경우는?",options:["물리치료사로 하여금 수술행위를 하게 한 때","약사법의 규정을 위반하여 담합행위를 한 때","보건복지부장관 또는 시장·군수·구청장의 시정명령을 이행하지 아니한 때","의료기관의 개설허가를 한 날부터 3개월 이내에 정당한 사유없이 업무를 시작하지 아니한 때","의료기관 개설자가 거짓으로 진료비를 청구하여 금고 이상의 형을 선고받고 그 형이 확정된 때"],answer:4,explanation:"거짓 진료비 청구로 금고 이상의 형이 확정된 때는 개설허가를 반드시(필요적으로) 취소하여야 한다."},
  {id:120,law:"medical",year:"2022",text:"「의료법」상 누구든지 의료행위를 행하는 의료인, 간호조무사, 의료기사 또는 의료행위를 받는 사람을 폭행·협박하여 상해에 이르게 한 경우 처벌로 옳은 것은?",options:["1년 이하의 징역이나 1천만원 이하의 벌금","3년 이하의 징역이나 2천만원 이하의 벌금","5년 이하의 징역이나 3천만원 이하의 벌금","5년 이하의 징역이나 4천만원 이하의 벌금","7년 이하의 징역이나 5천만원 이하의 벌금"],answer:4,explanation:"의료인 등에 대한 폭행·협박으로 상해에 이르게 한 경우: 7년 이하의 징역 또는 5천만원 이하의 벌금."},
  {id:121,law:"medical",year:"2023",text:"「의료법」상 의료인에 해당하는 직종은?",options:["안경사","조산사","임상병리사","작업치료사","물리치료사"],answer:1,explanation:"의료인: 의사, 치과의사, 한의사, 조산사, 간호사(5종). 나머지는 의료기사 또는 기타."},
  {id:122,law:"medical",year:"2023",text:"「의료법」상 직접 진찰하거나 검안하였을 때 사망진단서를 발급할 수 있는 자는?",options:["의사·한의사·간호사","의사·간호사·조산사","의사·치과의사·한의사","치과의사·조산사·간호사","치과의사·조산사·한의사"],answer:2,explanation:"사망진단서 발급: 의사·치과의사·한의사. 조산사는 출생·사산 증명서만 발급 가능."},
  {id:123,law:"medical",year:"2023",text:"「의료법」상 진료기록부 등의 보존기간이 다른 것은?",options:["처방전","환자 명부","간호기록부","방사선사진 및 그 소견서","검사내용 및 검사소견기록"],answer:0,explanation:"처방전: 2년. 환자명부·간호기록부·검사내용·방사선사진: 5년. 진료기록부·수술기록: 10년."},
  {id:124,law:"medical",year:"2023",text:"「의료법」상 종합병원·병원·치과병원·한방병원 또는 요양병원을 개설하려면 누구의 허가가 있어야 하는가?",options:["보건소장","시·도지사","질병관리청장","보건복지부장관","국립중앙의료원장"],answer:1,explanation:"병원급 의료기관 개설허가: 시·도지사."},
  {id:125,law:"medical",year:"2023",text:"「의료법」상 의료기관을 개설할 수 없는 자가 의료기관을 개설하거나 운영하였을 때 벌칙은?",options:["500만원 이하의 벌금","1년 이하의 징역이나 1천만원 이하의 벌금","2년 이하의 징역이나 2천만원 이하의 벌금","5년 이하의 징역이나 5천만원 이하의 벌금","10년 이하의 징역이나 1억원 이하의 벌금"],answer:3,explanation:"무자격자의 의료기관 개설·운영: 5년 이하의 징역 또는 5천만원 이하의 벌금."},
  {id:126,law:"medical",year:"2024",text:"「의료법」에 규정된 의료법의 목적은?",options:["국민 대상 보건 교육","국민 대상 사회복지 활성화","국민에게 의료기기 보급","국민의 건강을 보호하고 증진","국민의 인간다운 삶과 권리 보장"],answer:3,explanation:"의료법 제1조: 국민의 건강을 보호하고 증진하는 데에 목적이 있다."},
  {id:127,law:"medical",year:"2024",text:"「의료법」상 세탁물처리업을 하는 'A'가 교통사고로 2개월간 휴업을 하고자 하는 경우 'A'는 누구에게 신고해야 하는가?",options:["시장","대통령","보건소장","보건복지부장관","행정안전부장관"],answer:0,explanation:"세탁물처리업소의 휴업·폐업 신고는 시장·군수·구청장에게 한다. 보기 중 가장 적합한 것은 시장이다."},
  {id:128,law:"medical",year:"2024",text:"「의료법」상 외국의 의료인 면허를 가지고 일정기간 국내에 체류하는 자가 국내에서 교육연구사업을 수행하기 위해서는 누구의 승인을 받아야 하는가?",options:["보건소장","외교부장관","보건복지부장관","특별자치도지사","시장·군수·구청장"],answer:2,explanation:"외국 의료인이 국내에서 교육·연구사업을 수행하려면 보건복지부장관의 승인이 필요하다."},
  {id:129,law:"medical",year:"2024",text:"「의료법」에 규정된 정보통신기술을 활용하여 먼 곳에 있는 의료인에게 의료지식이나 기술을 지원하는 것은?",options:["대면의료","원격의료","대체의료","컴퓨터의료","인공지능의료"],answer:1,explanation:"의료법 제34조: 원격의료란 컴퓨터·화상통신 등 정보통신기술을 활용하여 먼 곳에 있는 의료인에게 의료지식이나 기술을 지원하는 것."},

  // ===== 장애인복지법 =====
  {id:201,law:"disabled",year:"2019",text:"「장애인복지법」상 장애인학대의 내용으로 명시되지 않은 것은?",options:["차별","가혹행위","경제적 착취","신체적 폭력","언어적 폭력"],answer:0,explanation:"장애인 학대: 신체적·정신적·정서적·언어적·성적 폭력, 가혹행위, 경제적 착취, 유기, 방임. 차별은 별도의 장애인차별금지법에서 규율하며 학대의 정의에 명시되지 않음."},
  {id:202,law:"disabled",year:"2019",text:"「장애인복지법」상 장애인을 전문적으로 상담·치료·훈련하거나 장애인의 일상생활, 여가활동 및 사회 참여 활동 등을 지원하는 시설은?",options:["장애인 거주시설","장애인 의료재활시설","장애인 직업재활시설","장애인 지역사회재활시설","장애인 자립생활지원시설"],answer:3,explanation:"장애인 지역사회재활시설: 전문적 상담·치료·훈련 및 일상생활·여가·사회참여 지원."},
  {id:203,law:"disabled",year:"2019",text:"「장애인복지법」상 직무상 장애인학대 및 장애인 대상 성범죄의 발생사실을 알고도 장애인권익옹호기관 또는 수사기관에 신고하지 아니한 사람에게 과태료를 부과·징수할 수 있는 자는?",options:["대통령","관할 보건소장","관할 경찰서장","보건복지부장관","시장·군수·구청장"],answer:4,explanation:"장애인학대 신고 의무 위반에 대한 과태료는 시장·군수·구청장이 부과·징수한다."},
  {id:204,law:"disabled",year:"2020",text:"「장애인복지법」상 장애인정책종합계획에 대한 설명으로 옳은 것은?",options:["보건복지부장관은 종합계획의 추진성과를 3년마다 평가하여야 한다","보건복지부장관은 10년마다 장애인정책종합계획을 수립·시행하여야 한다","보건복지부장관은 종합계획을 수립하되, 장애인정책조정위원회의 심의를 미리 거쳐야 한다","관계 중앙행정기관의 장은 장애인의 권익과 복지증진을 위하여 관련 업무에 대한 사업계획을 3년마다 수립·시행하여야 한다","관계 중앙행정기관의 장은 장애인의 권익과 복지증진을 위하여 관련 업무에 대한 사업계획을 매년 국무총리에게 제출하여야 한다"],answer:4,explanation:"관계 중앙행정기관의 장은 매년 장애인 관련 사업계획을 국무총리에게 제출하여야 한다."},
  {id:205,law:"disabled",year:"2020",text:"「장애인복지법」상 장애인의 장애 인정과 장애 정도 사정(査定)에 관한 업무를 담당하게 하기 위하여 보건복지부에 둘 수 있는 위원회는?",options:["보훈심사위원회","장애판정위원회","장애인정책조정위원회","지방장애인복지위원회","건강보험정책심의위원회"],answer:1,explanation:"장애 인정·사정 업무를 위해 보건복지부에 장애판정위원회를 둘 수 있다."},
  {id:206,law:"disabled",year:"2020",text:"「장애인복지법」상 거주공간을 활용하여 일반가정에서 생활하기 어려운 장애인에게 일정 기간 동안 거주·요양·지원 등의 서비스를 제공하는 동시에 지역사회생활을 지원하는 시설은?",options:["장애인 거주시설","장애인 직업재활시설","장애인 자립생활시설","장애인 의료재활시설","장애인 지역사회재활시설"],answer:0,explanation:"장애인 거주시설: 거주공간을 활용하여 일반가정에서 생활하기 어려운 장애인에게 거주·요양·지원 서비스 제공."},
  {id:207,law:"disabled",year:"2021",text:"「장애인복지법」상 장애인에 대하여 신체적·정신적·정서적·언어적·성적 폭력이나 가혹행위, 경제적 착취, 유기 또는 방임을 하는 것을 무엇이라 하는가?",options:["장애인폭력","장애인착취","장애인학대","장애인유기","장애인방임"],answer:2,explanation:"장애인학대의 정의: 신체적·정신적·정서적·언어적·성적 폭력, 가혹행위, 경제적 착취, 유기 또는 방임."},
  {id:208,law:"disabled",year:"2021",text:"「장애인복지법」상 국가가 장애인을 보호하는 보호자에게 그의 경제적 수준과 장애인의 장애 정도를 고려하여 장애로 인한 추가적 비용을 보전하게 하기 위하여 지급할 수 있는 것은?",options:["보호수당","상병수당","장애수당","자녀교육비","장애아동수당"],answer:2,explanation:"장애수당: 국가가 장애인 보호자에게 장애로 인한 추가 비용 보전을 위해 지급."},
  {id:209,law:"disabled",year:"2021",text:"「장애인복지법」상 장애인을 입원 또는 통원하게 하여 상담, 진단·판정, 치료 등 의료재활서비스를 제공하는 시설은?",options:["장애인 쉼터","장애인 거주시설","장애인 직업재활시설","장애인 의료재활시설","장애인 지역사회재활시설"],answer:3,explanation:"장애인 의료재활시설: 입원·통원을 통한 상담·진단·치료 등 의료재활서비스 제공."},
  {id:210,law:"disabled",year:"2022",text:"「장애인복지법」상 장애인복지의 기본이념으로 옳은 것은?",options:["장애인의 보건 향상","장애인의 건강 보호","장애인의 보건 및 복지 향상","장애인의 완전한 사회 참여와 평등을 통한 사회통합","장애인의 정치·경제·사회·문화 활동에 권익과 특권 부여"],answer:3,explanation:"장애인복지법 기본이념: 장애인의 완전한 사회 참여와 평등을 통하여 사회통합을 이루는 것."},
  {id:211,law:"disabled",year:"2022",text:"「장애인복지법」상 장애인등록증을 발급할 수 있는 사람은?",options:["군수","대통령","관할 보건소장","행정안전부장관","보건복지부장관"],answer:0,explanation:"장애인등록증(복지카드)은 시장·군수·구청장이 발급한다."},
  {id:212,law:"disabled",year:"2022",text:"「장애인복지법」상 장애인학대 범죄로 형 또는 치료감호를 선고받는 경우, 장애인 관련 기관에 취업 제한 기간은 선고받은 형의 집행이 종료된 날부터 얼마를 초과하지 못하는가?",options:["3년","5년","7년","10년","15년"],answer:3,explanation:"장애인학대 관련 범죄로 형 집행 종료 후 장애인 관련 기관 취업 제한: 10년 초과 불가."},
  {id:213,law:"disabled",year:"2023",text:"「장애인복지법」상 주요 외부 신체 기능의 장애, 내부기관의 장애는?",options:["정서적 장애","정신적 장애","신체적 장애","언어적 장애","결함적 장애"],answer:2,explanation:"신체적 장애: 주요 외부 신체 기능의 장애, 내부기관의 장애."},
  {id:214,law:"disabled",year:"2023",text:"「장애인복지법」의 내용 중 A와 B에 들어갈 말로 옳게 짝지어진 것은? \"( A )은 장애인 복지 정책의 수립에 필요한 기초 자료를 활용하기 위하여 ( B )마다 장애인 실태조사를 실시하여야 한다.\"",options:["보건소장 / 1년","질병관리청장 / 1년","국립중앙의료원장 / 1년","보건복지부장관 / 3년","시장·군수·구청장 / 3년"],answer:3,explanation:"보건복지부장관은 3년마다 장애인 실태조사를 실시한다."},
  {id:215,law:"disabled",year:"2023",text:"「장애인복지법」상 장애인을 전문적으로 상담·치료·훈련하거나 장애인의 일상생활, 여가활동 및 사회참여활동 등을 지원하는 시설은?",options:["장애인 거주시설","장애인 직업재활시설","장애인 의료재활시설","장애인 자립지원시설","장애인 지역사회재활시설"],answer:4,explanation:"장애인 지역사회재활시설: 전문적 상담·치료·훈련 및 일상생활·여가·사회참여 지원."},
  {id:216,law:"disabled",year:"2024",text:"「장애인복지법」상 장애인 종합정책의 수립·이행을 감독·평가하기 위한 장애인정책조정위원회는 누구의 소속 하에 두어야 하는가?",options:["대통령","국무총리","시·도지사","국립재활원장","보건복지부장관"],answer:1,explanation:"장애인정책조정위원회는 국무총리 소속이다."},
  {id:217,law:"disabled",year:"2024",text:"「장애인복지법」상 시장·군수·구청장이 등록증을 받은 장애인의 장애 상태의 변화에 따른 장애 정도를 조정할 때 정밀심사를 의뢰할 수 있는 공공기관은?",options:["국립암센터","국립재활원","국립대병원","국민연금공단","국립중앙의료원"],answer:3,explanation:"장애 정도 정밀심사 의뢰 기관: 국민연금공단."},
  {id:218,law:"disabled",year:"2024",text:"「장애인복지법」상 국가와 지방자치단체 외의 자가 장애인 복지시설을 설치·운영하려면 해당 시설의 관할 소재지 누구에게 신고하여야 하는가?",options:["경찰서장","보건소장","소방서장","시장·군수·구청장","문화체육관광부장관"],answer:3,explanation:"장애인복지시설 설치·운영 신고: 관할 시장·군수·구청장에게 신고."},

  // ===== 노인복지법 =====
  {id:301,law:"elderly",year:"2019",text:"「노인복지법」상 노인에 대하여 신체적·정신적·정서적·성적 폭력 및 경제적 착취 또는 가혹행위를 하거나 유기 또는 방임을 하는 것을 뜻하는 용어는?",options:["노인무시","노인방임","노인학대","노인폭행","노인폭력"],answer:2,explanation:"노인학대의 정의: 신체적·정신적·정서적·성적 폭력 및 경제적 착취, 가혹행위, 유기, 방임."},
  {id:302,law:"elderly",year:"2019",text:"「노인복지법」상 노인일자리개발·보급사업, 조사사업, 교육·홍보 및 협력사업, 프로그램 인증·평가사업 등을 지원하는 기관은?",options:["노인복지기관","노인인력개발기관","노인창업지원기관","노인취업알선기관","노인일자리지원기관"],answer:1,explanation:"노인인력개발기관: 노인일자리 개발·보급, 조사, 교육·홍보, 협력사업, 프로그램 인증·평가 지원."},
  {id:303,law:"elderly",year:"2019",text:"「노인복지법」상 노인의료복지시설에 해당되는 것은?",options:["양로시설","노인복지관","노인복지주택","노인공동생활가정","노인요양공동생활가정"],answer:4,explanation:"노인의료복지시설: 노인요양시설, 노인요양공동생활가정. 노인주거복지시설: 양로시설, 노인복지주택, 노인공동생활가정."},
  {id:304,law:"elderly",year:"2019",text:"「노인복지법」상 노인복지시설 종사자가 노인에게 성적 수치심을 주는 성폭행·성희롱 등의 행위를 한 경우 그 죄에서 정한 형의 어느 정도까지 가중처벌을 할 수 있는가?",options:["2분의 1","3분의 1","4분의 1","5분의 1","6분의 1"],answer:0,explanation:"노인복지시설 종사자의 노인 성범죄: 법정형의 2분의 1까지 가중처벌 가능."},
  {id:305,law:"elderly",year:"2020",text:"「노인복지법」상 보건복지부장관은 노인의 보건 및 복지에 관한 실태조사를 몇 년마다 실시하여야 하는가?",options:["1년","2년","3년","4년","5년"],answer:2,explanation:"보건복지부장관은 3년마다 노인 실태조사를 실시하여야 한다."},
  {id:306,law:"elderly",year:"2020",text:"「노인복지법」상 노인여가복지시설에 해당하는 것은?",options:["노인복지관","노인요양시설","노인복지주택","노인공동생활가정","노인요양공동생활가정"],answer:0,explanation:"노인여가복지시설: 노인복지관, 경로당, 노인교실. 노인요양시설·요양공동생활가정은 노인의료복지시설."},
  {id:307,law:"elderly",year:"2020",text:"「노인복지법」상 국가 또는 지방자치단체외의 자가 노인의료복지시설을 설치하고자 하는 경우 누구에게 신고하여야 하는가?",options:["대통령","보건소장","행정안전부장관","보건복지부장관","시장·군수·구청장"],answer:4,explanation:"노인의료복지시설 설치 신고: 시장·군수·구청장."},
  {id:308,law:"elderly",year:"2020",text:"「노인복지법」상 가정에서 일상생활을 영위하고 있는 노인으로서 신체적·정신적 장애로 어려움을 겪고 있는 노인에게 필요한 각종 편의를 제공하여 지역사회 안에서 건전하고 안정된 노후를 영위하도록 하는 서비스는?",options:["단기보호서비스","방문간호서비스","방문요양서비스","방문목욕서비스","주·야간보호서비스"],answer:2,explanation:"방문요양서비스: 가정에서 생활하는 신체적·정신적 장애 노인에게 편의를 제공하여 지역사회 안에서 안정된 노후를 영위하도록 지원."},
  {id:309,law:"elderly",year:"2021",text:"「노인복지법」에 명시된 「노인복지법」의 목적으로 옳은 것은?",options:["노인의 사회통합","노인의 권리보장","노인의 보건복지증진","노인의 사회보장 증진","노인의 사회활동 참여증진"],answer:2,explanation:"노인복지법 제1조: 노인의 질환을 사전 예방 또는 조기 발견하고 질환 상태에 따른 적절한 치료·요양으로 심신의 건강을 유지하고, 노후의 생활 안정을 위하여 노인의 보건복지증진에 기여함을 목적으로 한다."},
  {id:310,law:"elderly",year:"2021",text:"「노인복지법」상 노인에게 취업 상담 및 정보를 제공하거나 노인일자리를 알선하는 기관은?",options:["노인인력개발기관","노인취업알선기관","노인보호전문기관","노인인력지원기관","노인일자리지원기관"],answer:1,explanation:"노인취업알선기관: 노인에게 취업 상담, 정보 제공, 일자리 알선."},
  {id:311,law:"elderly",year:"2021",text:"「노인복지법」상 지역노인들이 자율적으로 친목도모·취미 활동·공동작업장 운영 및 각종 정보교환과 기타 여가활동을 할 수 있도록 하는 장소를 제공함을 목적으로 하는 시설은?",options:["경로당","노인교실","노인복지관","노인요양시설","노인보호전문기관"],answer:0,explanation:"경로당: 지역노인들이 자율적으로 친목·취미·공동작업 및 여가활동을 할 수 있는 장소 제공."},
  {id:312,law:"elderly",year:"2021",text:"「노인복지법」상 노인학대관련범죄로 형 또는 치료감호를 선고하는 경우 그 형 또는 치료감호의 전부 또는 일부의 집행이 종료된 날부터 노인관련기관의 취업제한기간은 몇 년을 초과하지 못하는가?",options:["1년","3년","5년","7년","10년"],answer:4,explanation:"노인학대 관련 범죄: 형 집행 종료 후 노인 관련 기관 취업 제한 10년 초과 불가."},
  {id:313,law:"elderly",year:"2022",text:"「노인복지법」상 노인에 대하여 신체적·정신적·정서적·성적 폭력 및 경제적 착취 또는 가혹행위를 하거나 유기 또는 방임을 하는 것을 뜻하는 용어는?",options:["노인학대","노인폭력","노인멸시","노인폭행","노인무시"],answer:0,explanation:"노인학대: 신체적·정신적·정서적·성적 폭력, 경제적 착취, 가혹행위, 유기, 방임."},
  {id:314,law:"elderly",year:"2022",text:"「노인복지법」상 국가 또는 지방자치단체가 대통령령으로 정하는 바에 따라 65세 이상의 자에게 건강진단을 실시하는 기간과 횟수는?",options:["1년에 2회 이상","2년에 1회 이상","2년에 2회 이상","3년에 1회 이상","3년에 2회 이상"],answer:1,explanation:"65세 이상 노인 건강진단: 2년에 1회 이상 실시."},
  {id:315,law:"elderly",year:"2022",text:"「노인복지법」상 재가노인복지시설에서 제공되는 서비스가 아닌 것은?",options:["방문요양서비스","방문간호서비스","방문목욕서비스","장기보호서비스","주·야간보호서비스"],answer:3,explanation:"재가노인복지시설 서비스: 방문요양, 방문간호, 방문목욕, 주·야간보호, 단기보호. 장기보호서비스는 해당 없음."},
  {id:316,law:"elderly",year:"2022",text:"「노인복지법」상 노인복지시설에서 노인 등의 가사활동·신체활동 지원 등의 업무를 전문적으로 수행하는 사람은?",options:["물리치료사","작업치료사","요양보호사","사회복지사","노인복지상담원"],answer:2,explanation:"요양보호사: 노인복지시설에서 노인의 가사활동·신체활동 지원 등을 전문적으로 수행하는 사람."},
  {id:317,law:"elderly",year:"2023",text:"「노인복지법」상 부양의무자에 해당하는 사람은?",options:["배우자와 직계존속","배우자와 직계존속 및 직계비속","직계존속 및 직계비속의 배우자","배우자와 직계비속 및 그 배우자","배우자와 직계존속 및 그 배우자"],answer:3,explanation:"노인복지법상 부양의무자: 배우자와 직계비속 및 그 배우자(며느리·사위 포함)."},
  {id:318,law:"elderly",year:"2023",text:"「노인복지법」상 지역사회 등에서 노인일자리의 개발·지원, 창업·육성 및 노인에 의한 재화의 생산·판매 등을 직접 담당하는 기관은?",options:["노인복지알선기관","노인인력개발기관","노인취업알선기관","노인재취업알선기관","노인일자리지원기관"],answer:4,explanation:"노인일자리지원기관: 지역사회 내 노인일자리 개발·지원, 창업·육성, 재화 생산·판매 등을 직접 담당."},
  {id:319,law:"elderly",year:"2023",text:"「노인복지법」상 노인복지시설에 해당하는 것은?",options:["노인주거복지시설","노인주택복지시설","노인요양복지시설","노인재활복지시설","노인경로복지시설"],answer:0,explanation:"노인복지시설 종류: 노인주거복지시설, 노인의료복지시설, 노인여가복지시설, 재가노인복지시설, 노인보호전문기관 등."},
  {id:320,law:"elderly",year:"2023",text:"「노인복지법」상 노인의료복지시설에 해당하는 것은?",options:["양로시설","노인복지관","노인복지주택","노인공동생활가정","노인요양공동생활가정"],answer:4,explanation:"노인의료복지시설: 노인요양시설, 노인요양공동생활가정. 양로시설·노인복지주택·노인공동생활가정은 주거복지시설."},
  {id:321,law:"elderly",year:"2024",text:"「노인복지법」상 노인의 보건 및 복지증진을 위한 시책을 강구하여 추진하여야 하는 자는?",options:["국가와 노인복지시설","국가와 지방자치단체","지방자치단체와 노인복지시설","지방자치단체와 한국사회복지협의회","한국사회복지협의회와 노인복지시설"],answer:1,explanation:"노인복지법: 국가와 지방자치단체는 노인의 보건·복지증진을 위한 시책을 강구하여야 한다."},
  {id:322,law:"elderly",year:"2024",text:"「노인복지법」상 시장·군수·구청장이 국·공립 병원에서 65세 이상의 자에게 2년에 1회 이상 발급할 수 있는 것은?",options:["건강진단","재무상담","복지조치","생활지원","보건급여"],answer:0,explanation:"65세 이상 노인에 대해 국·공립 병원에서 건강진단을 2년에 1회 이상 실시."},

  // ===== 국민건강보험법 =====
  {id:401,law:"insurance",year:"2019",text:"「국민건강보험법」상 이 법에 명시된 목적으로 옳은 것은?",options:["노인의 보건복지증진","국민의 보건 및 의료 향상","국민의 건강을 보호하고 증진","국민보건 향상과 사회보장 증진","장애인의 복지와 사회활동 참여증진"],answer:3,explanation:"국민건강보험법 제1조: 국민의 질병·부상에 대한 예방·진단·치료·재활과 출산·사망 및 건강증진에 대하여 보험급여를 실시함으로써 국민보건 향상과 사회보장 증진에 이바지함을 목적으로 한다."},
  {id:402,law:"insurance",year:"2019",text:"「국민건강보험법」상 보험급여의 정지 사유에 해당되지 않는 것은?",options:["국외에 여행 중인 경우","교도소에 수용되어 있는 경우","국외에서 업무에 종사하고 있는 경우","선거에 당선되어 취임하는 공무원인 경우","「병역법」에 따른 현역병, 전환복무된 사람 및 군간부후보생인 경우"],answer:3,explanation:"선거에 당선된 공무원은 보험급여 정지 사유가 아니다. 정지 사유: 국외여행, 국외취업, 현역병·군간부후보생, 교도소 수용."},
  {id:403,law:"insurance",year:"2019",text:"「국민건강보험법」상 법인의 종사자가 거짓이나 그 밖의 부정한 방법으로 보험급여를 받은 경우에 그 행위자를 벌하는 외에 그 법인에게도 해당 조문의 벌금형을 과하는 것은?",options:["구상권","양벌규정","권한위임","감경규정","가중처벌"],answer:1,explanation:"양벌규정: 법인 종사자의 위반행위에 대해 행위자 외 법인에게도 벌금형 부과."},
  {id:404,law:"insurance",year:"2020",text:"「국민건강보험법」상 건강보험정책심의위원회와 관련된 사항으로 옳은 것은?",options:["위원의 임기는 5년으로 한다","위원장은 보건복지부장관이 된다","위원은 대통령이 임명 또는 위촉한다","요양급여비용에 관한 사항을 심의·의결한다","위원장 1명과 부위원장 1명을 포함하여 30명의 위원으로 구성한다"],answer:3,explanation:"건강보험정책심의위원회: 요양급여비용 등 건강보험 주요 사항을 심의·의결. 위원장은 보건복지부차관, 위원 25명, 임기 3년."},
  {id:405,law:"insurance",year:"2020",text:"「국민건강보험법」상 건강보험 자격의 변동 시기에 해당하는 것은?",options:["수급권자가 된 날","사망한 날의 다음 날","국적을 잃은 날의 다음 날","지역가입자가 다른 세대로 전입한 날","국내에 거주하지 아니하게 된 날의 다음 날"],answer:3,explanation:"지역가입자가 다른 세대로 전입한 날에 자격이 변동된다. 자격 상실: 사망한 날의 다음 날, 국적을 잃은 날의 다음 날 등."},
  {id:406,law:"insurance",year:"2020",text:"「국민건강보험법」상 요양급여를 실시하는 요양기관으로 옳지 않은 것은?",options:["「의료법」에 따른 침술원","「지역보건법」에 따른 보건소","「약사법」에 따라 등록된 약국","「의료법」에 따라 개설된 의료기관","「약사법」에 따라 설립된 한국희귀·필수의약품센터"],answer:0,explanation:"침술원은 요양기관이 아니다. 요양기관: 의료기관, 약국, 보건소·보건의료원·보건지소, 한국희귀·필수의약품센터 등."},
  {id:407,law:"insurance",year:"2021",text:"「국민건강보험법」상 가입자 자격의 상실 시기로 옳은 것은?",options:["사망한 날","국적을 잃은 날","수급권자가 된 날의 다음 날","직장가입자의 피부양자가 된 날의 다음 날","국내에 거주하지 아니하게 된 날의 다음 날"],answer:4,explanation:"자격 상실 시기: 사망한 날의 다음 날, 국적 상실의 다음 날, 국내 미거주의 다음 날, 수급권자가 된 날. 국내에 거주하지 않게 된 날의 다음 날 상실."},
  {id:408,law:"insurance",year:"2021",text:"「국민건강보험법」상 보험급여의 제한 사유에 해당되는 것은?",options:["국외에 체류하는 경우","「병역법」에 따른 현역병인 경우","전환복무된 사람 및 군간부후보생인 경우","교도소·그 밖에 이에 준하는 시설에 수용되어 있는 경우","업무 또는 공무로 생긴 질병·부상·재해로 다른 법령에 따른 보험급여를 받게 되는 경우"],answer:4,explanation:"업무상 재해로 다른 법령(산재보험 등)에 따른 급여를 받는 경우 건강보험급여를 제한한다. 국외 체류·현역병·교도소 수용은 급여 '정지' 사유."},
  {id:409,law:"insurance",year:"2022",text:"「국민건강보험법」상 직업의 종류와 관계없이 근로의 대가로 보수를 받아 생활하는 사람은?",options:["근로자","공무원","교직원","사용자","사업주"],answer:0,explanation:"근로자: 직업 종류와 무관하게 근로의 대가로 보수를 받아 생활하는 사람."},

const LAW_LABELS = {
  kisa: {name:"의료기사법", color:"#4f8ef7", bg:"#1a2a4a"},
  medical: {name:"의료법", color:"#3ecf8e", bg:"#0d2a1a"},
  disabled: {name:"장애인복지법", color:"#b07fe8", bg:"#1f1040"},
  elderly: {name:"노인복지법", color:"#e8a84f", bg:"#2a1a05"},
  insurance: {name:"국민건강보험법", color:"#4ecdc4", bg:"#051a1a"},
};

let currentTab = "all";
let answered = {}; // {id: selectedIdx}
let showWrong = false;

function renderTabs() {
  const tabs = document.getElementById("tabs");
  const counts = {all: QUESTIONS.length};
  for(const k of Object.keys(LAW_LABELS)) counts[k] = QUESTIONS.filter(q=>q.law===k).length;
  const defs = [
    {key:"all", name:"전체"},
    ...Object.entries(LAW_LABELS).map(([k,v])=>({key:k, name:v.name}))
  ];
  tabs.innerHTML = defs.map(d=>`
    <button class="tab ${currentTab===d.key?'active':''}" onclick="setTab('${d.key}')">
      ${d.name}<span class="tab-count">${counts[d.key]}</span>
    </button>
  `).join("");
}

function setTab(t) {
  currentTab = t;
  showWrong = false;
  renderTabs();
  renderQuestions();
}

function getFiltered() {
  let qs = currentTab === "all" ? QUESTIONS : QUESTIONS.filter(q=>q.law===currentTab);
  if(showWrong) qs = qs.filter(q => answered[q.id] !== undefined && answered[q.id] !== q.answer);
  return qs;
}

function renderQuestions() {
  const list = document.getElementById("question-list");
  const qs = getFiltered();
  updateStats();
  updateProgress(qs);

  if(qs.length === 0) {
    list.innerHTML = `<div class="empty">🎉 오답이 없습니다!</div>`;
    return;
  }

  list.innerHTML = qs.map((q, qi) => {
    const sel = answered[q.id];
    const isAnswered = sel !== undefined;
    const isCorrect = sel === q.answer;
    const law = LAW_LABELS[q.law];
    const cardClass = isAnswered ? (isCorrect ? "answered-correct" : "answered-wrong") : "";
    const yearBadge = q.year ? `<span style="font-size:.7rem;color:${law.color};margin-left:6px;opacity:.8">${q.year}년</span>` : "";

    const opts = q.options.map((opt, i) => {
      let cls = "";
      if(isAnswered) {
        cls = "disabled";
        if(i === q.answer) cls += " show-correct";
        else if(i === sel && sel !== q.answer) cls += " wrong";
      } else if(i === sel) cls = "selected";
      return `<div class="option ${cls}" onclick="selectOption(${q.id}, ${i})">
        <div class="option-num">${"①②③④⑤"[i]}</div>
        <div>${opt}</div>
      </div>`;
    }).join("");

    const resultHtml = isAnswered ? `
      <div class="result-box ${isCorrect?'correct':'wrong'} show">
        ${isCorrect
          ? `<span class="result-correct-label">✓ 정답!</span><div class="explanation">${q.explanation}</div>`
          : `<span class="result-wrong-label">✗ 오답 — 정답: ${"①②③④⑤"[q.answer]}</span><div class="explanation">${q.explanation}</div>`
        }
      </div>` : `<div class="result-box"></div>`;

    return `<div class="q-card ${cardClass}" id="qcard-${q.id}">
      <div class="q-header">
        <div class="q-num">Q${q.id > 500 ? q.id-500+91+"★" : q.id}</div>
        <div><span class="q-tag" style="background:${law.bg};color:${law.color}">${law.name}</span>${yearBadge}
          <div class="q-text" style="margin-top:6px">${q.text}</div>
        </div>
      </div>
      <div class="options">${opts}</div>
      ${resultHtml}
    </div>`;
  }).join("");
}

function selectOption(id, idx) {
  if(answered[id] !== undefined) return;
  answered[id] = idx;
  updateStats();
  const q = QUESTIONS.find(q=>q.id===id);
  const card = document.getElementById(`qcard-${id}`);
  if(!card) return;
  card.className = `q-card ${idx === q.answer ? "answered-correct" : "answered-wrong"}`;
  const opts = card.querySelectorAll(".option");
  opts.forEach((el,i) => {
    el.classList.add("disabled");
    if(i === q.answer) el.classList.add("show-correct");
    else if(i === idx && idx !== q.answer) el.classList.add("wrong");
  });
  const rb = card.querySelector(".result-box");
  const isCorrect = idx === q.answer;
  rb.className = `result-box ${isCorrect?'correct':'wrong'} show`;
  rb.innerHTML = isCorrect
    ? `<span class="result-correct-label">✓ 정답!</span><div class="explanation">${q.explanation}</div>`
    : `<span class="result-wrong-label">✗ 오답 — 정답: ${"①②③④⑤"[q.answer]}</span><div class="explanation">${q.explanation}</div>`;
  updateProgress(getFiltered());
}

function updateStats() {
  const all = Object.keys(answered).length;
  const correct = Object.entries(answered).filter(([id,sel])=>{
    const q = QUESTIONS.find(q=>q.id==id);
    return q && sel === q.answer;
  }).length;
  const wrong = all - correct;
  document.getElementById("s-total").textContent = QUESTIONS.length;
  document.getElementById("s-correct").textContent = correct;
  document.getElementById("s-wrong").textContent = wrong;
  document.getElementById("s-rate").textContent = all > 0 ? Math.round(correct/all*100)+"%": "0%";
}

function updateProgress(qs) {
  const total = qs.length;
  const done = qs.filter(q=>answered[q.id]!==undefined).length;
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById("progress-fill").style.width = pct+"%";
  document.getElementById("progress-text").textContent = `${done} / ${total} 문제 풀었습니다 (${pct}%)`;
}

function showWrongOnly() {
  showWrong = !showWrong;
  renderQuestions();
}

function resetAll() {
  if(!confirm("모든 풀이 기록을 초기화할까요?")) return;
  answered = {};
  showWrong = false;
  renderTabs();
  renderQuestions();
}

renderTabs();
renderQuestions();

// ===== 모드 전환 =====
function setMode(mode) {
  document.getElementById('quiz-area').style.display = mode==='quiz'?'':'none';
  document.getElementById('summary-area').style.display = mode==='summary'?'':'none';
  document.getElementById('mode-quiz').classList.toggle('active', mode==='quiz');
  document.getElementById('mode-summary').classList.toggle('active', mode==='summary');
  if(mode==='summary') initSummary();
}

// ===== 써머리 =====
const SUMMARY_LAWS = [
  {key:'medical', name:'의료법'},
  {key:'kisa', name:'의료기사법'},
  {key:'disabled', name:'장애인복지법'},
  {key:'elderly', name:'노인복지법'},
  {key:'insurance', name:'국민건강보험법'},
];

let currentSummaryLaw = 'medical';

function initSummary() {
  const tabsEl = document.getElementById('summary-law-tabs');
  if(tabsEl.innerHTML) return;
  tabsEl.innerHTML = SUMMARY_LAWS.map(l=>
    `<button class="summary-law-tab ${l.key===currentSummaryLaw?'active':''}" onclick="setSummaryLaw('${l.key}')">${l.name}</button>`
  ).join('');
  renderSummary();
}

function setSummaryLaw(key) {
  currentSummaryLaw = key;
  document.querySelectorAll('.summary-law-tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  renderSummary();
}

function toggleSection(el) {
  el.closest('.summary-section').classList.toggle('open');
}

function renderSummary() {
  const el = document.getElementById('summary-content');
  el.innerHTML = getSummaryHTML(currentSummaryLaw);
}

function sec(title, color, content) {
  return `<div class="summary-section open">
    <div class="summary-header" onclick="toggleSection(this)">
      <div class="summary-title"><span style="color:${color}">●</span> ${title}</div>
      <span class="summary-arrow">▼</span>
    </div>
    <div class="summary-body">${content}</div>
  </div>`;
}
function row(k,v){return `<div class="s-row"><div class="s-key">${k}</div><div class="s-val">${v}</div></div>`;}
function note(t){return `<div class="s-note">${t}</div>`;}
function art(title,rows){return `<div class="s-article"><div class="s-article-title">${title}</div>${rows}</div>`;}

function getSummaryHTML(law) {
  if(law==='medical') return summaryMedical();
  if(law==='kisa') return summaryKisa();
  if(law==='disabled') return summaryDisabled();
  if(law==='elderly') return summaryElderly();
  if(law==='insurance') return summaryInsurance();
  return '';
}

function summaryMedical() {
  return sec('제1조 목적', '#3ecf8e', `
    ${row('목적','모든 국민이 수준 높은 의료 혜택을 받을 수 있도록 국민의료에 필요한 사항을 규정함으로써 <b>국민의 건강을 보호하고 증진</b>하는 데에 목적')}
  `) +
  sec('제2조 의료인 / 제3조 의료기관', '#3ecf8e', `
    ${art('의료인 5종', row('종류','의사, 치과의사, 한의사, <b>조산사</b>, 간호사'))}
    ${art('의료기관 구분',
      row('의원급','의원·치과의원·한의원 (주로 <b>외래환자</b> 대상)') +
      row('병원급','병원·치과병원·한방병원·요양병원·정신병원·<b>종합병원</b> (주로 <b>입원환자</b> 대상)') +
      row('조산원','조산사가 운영')
    )}
    ${note('<b>병원등(제3조의2)</b>: 병원·한방병원·요양병원은 <b>30개 이상</b> 병상 필요 (치과병원 제외)')}
  `) +
